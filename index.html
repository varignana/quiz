body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.65}

/* ── HEADER: fixed-width slots, nothing can overflow ── */
.hdr{
  background:var(--surf);border-bottom:1px solid var(--bdr);
  padding:7px 10px;
  display:flex;align-items:center;gap:6px;
  position:sticky;top:0;z-index:30;
  width:100%;overflow:hidden;
}
.hdr-logo{font-weight:700;font-size:13px;color:var(--acc);white-space:nowrap;flex-shrink:0}
.hdr-logo em{color:var(--text);font-style:normal;font-weight:400}
.hdr-sync{display:flex;align-items:center;gap:3px;flex-shrink:0}
.sync-dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-ok{background:var(--ok)}.dot-err{background:var(--err)}.dot-wait{background:var(--hint)}
/* sync text hidden on mobile, shown on wider */
.sync-lbl{font-size:10px;color:var(--muted);white-space:nowrap;display:none}
@media(min-width:500px){.sync-lbl{display:inline}}
/* Try button replaces native select — no dropdown arrow clipping issues */
.hdr-try{display:flex;align-items:center;gap:4px;margin-left:auto;flex-shrink:0}
.try-btn{
  font-size:11px;font-weight:600;padding:4px 8px;
  border-radius:var(--rs);border:1px solid var(--bdr2);
  background:var(--surf2);color:var(--text);
  cursor:pointer;white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis;
}
.try-btn:hover{background:var(--surf)}
.hdr-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.hbtn{padding:5px 7px;border-radius:var(--rs);border:1px solid var(--bdr2);background:transparent;color:var(--text);font-size:12px;cursor:pointer;flex-shrink:0}
.hbtn:hover{background:var(--surf2)}
.hbtn-pri{background:var(--text);color:var(--surf);border-color:var(--text);font-weight:700}
.hbtn-pri:hover{opacity:.85;background:var(--text)}
.hbtn-exam{background:var(--info-bg);color:var(--info-txt);border-color:var(--info-txt);font-weight:700}

/* Try dropdown (custom, shown when try-btn clicked) */
.try-dropdown{
  position:absolute;top:46px;left:0;right:0;background:var(--surf);
  border-bottom:1px solid var(--bdr2);z-index:50;max-height:60vh;overflow-y:auto;
  display:none;box-shadow:0 4px 12px rgba(0,0,0,.15);
}
.try-dropdown.open{display:block}
.try-option{padding:10px 16px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--bdr)}
.try-option:hover{background:var(--surf2)}
.try-option.active{color:var(--acc);font-weight:700}

/* Generic buttons */
.btn{padding:5px 9px;border-radius:var(--rs);border:1px solid var(--bdr2);background:transparent;color:var(--text);font-size:12px;cursor:pointer;white-space:nowrap;line-height:1.4;flex-shrink:0}
.btn:hover{background:var(--surf2)}.btn:disabled{opacity:.35;cursor:default}
.btn-pri{background:var(--text);color:var(--surf);border-color:var(--text);font-weight:600}
.btn-pri:hover{opacity:.85;background:var(--text)}
.btn-acc{display:block;width:100%;background:var(--acc);color:#000;border:none;font-weight:700;border-radius:var(--rs);padding:11px 22px;font-size:14px;cursor:pointer}
.btn-acc:hover{opacity:.9}.btn-acc:disabled{opacity:.4;cursor:default}
.btn-warn{background:var(--warn-bg);color:var(--warn-txt);border:1px solid var(--warn-txt);font-weight:600;border-radius:var(--rs);padding:5px 9px;cursor:pointer;font-size:12px}
.btn-retry{background:var(--info-bg);color:var(--info-txt);border:1px solid var(--info-txt);font-weight:600;border-radius:var(--rs);padding:7px 14px;cursor:pointer;font-size:13px;width:100%;margin-bottom:8px}
.btn-retry:hover{opacity:.9}

/* Layout */
.main{max-width:780px;margin:0 auto;padding:14px 12px 80px;width:100%}

/* Progress */
.prog-wrap{margin-bottom:10px}
.prog-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px}
.prog-bar{background:var(--bdr);border-radius:99px;height:5px}
.prog-fill{background:var(--acc);border-radius:99px;height:5px;transition:width .3s}

/* Nav bar: Prev | pills | Next */
.nav-bar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:14px}
.nav-prev{justify-self:start}
.nav-stats{display:flex;gap:5px;align-items:center;justify-content:center;flex-wrap:nowrap}
.nav-next{justify-self:end}
.pill{display:inline-flex;align-items:center;gap:3px;padding:4px 9px;border-radius:99px;font-size:11px;font-weight:700;white-space:nowrap}
.pill-ok{background:var(--ok-bg);color:var(--ok-txt)}
.pill-err{background:var(--err-bg);color:var(--err-txt)}
.pill-neu{background:var(--surf2);color:var(--muted);border:1px solid var(--bdr)}
.btn-nav{padding:7px 13px;border-radius:var(--rs);border:1.5px solid var(--bdr2);background:var(--surf);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-nav:hover:not(:disabled){background:var(--surf2)}
.btn-nav:disabled{opacity:.3;cursor:default}
.btn-nav-next{background:var(--acc);color:#000;border-color:var(--acc);padding:8px 16px;font-size:14px;box-shadow:0 2px 8px rgba(224,123,0,.35)}
.btn-nav-next:hover:not(:disabled){opacity:.9;background:var(--acc)}

/* Type badge */
.tbadge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.tb-s{background:var(--info-bg);color:var(--info-txt)}
.tb-m{background:var(--warn-bg);color:var(--warn-txt)}
.tb-match{background:var(--ok-bg);color:var(--ok-txt)}
.tb-ord{background:var(--acc-bg);color:var(--acc-txt)}

/* Card */
.card{background:var(--surf);border-radius:var(--r);border:1px solid var(--bdr);padding:18px;margin-bottom:10px}
.qnum{font-size:11px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;display:flex;align-items:center;gap:8px}
.stem{font-size:15px;line-height:1.75;margin-bottom:16px}

/* ═══════════════════════════════════════════════════════════════
   OPTION: display:block, NO child elements, circle = ::before
   Width is always 100% of parent content area. Cannot break.
═══════════════════════════════════════════════════════════════ */
.opt{
  display:block;
  position:relative;
  padding:12px 14px 12px 52px;
  min-height:52px;
  border-radius:var(--rs);
  border:1.5px solid var(--bdr);
  margin-bottom:8px;
  cursor:pointer;
  background:var(--surf2);
  font-size:14px;
  line-height:1.55;
  word-wrap:break-word;
  transition:border-color .15s,background .15s;
}
.opt::before{
  content:attr(data-icon);
  position:absolute;
  left:14px;top:12px;
  width:28px;height:28px;
  border-radius:50%;
  border:1.5px solid var(--bdr2);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;
  color:var(--muted);background:transparent;
  transition:all .15s;
}
.opt:hover:not(.locked):not(.rev-ok):not(.rev-wrong):not(.rev-skip){border-color:var(--acc);background:var(--acc-bg)}
.opt:hover:not(.locked):not(.rev-ok):not(.rev-wrong):not(.rev-skip)::before{color:var(--acc-txt);border-color:var(--acc)}
.opt.sel{border-color:var(--acc);background:var(--acc-bg)}
.opt.sel::before{color:var(--acc-txt);border-color:var(--acc);background:var(--acc-bg)}
.opt.rev-ok{border-color:var(--ok);background:var(--ok-bg);cursor:default}
.opt.rev-ok::before{content:'\2713';color:var(--ok-txt);border-color:var(--ok);background:var(--ok-bg)}
.opt.rev-wrong{border-color:var(--err);background:var(--err-bg);cursor:default}
.opt.rev-wrong::before{content:'\2717';color:var(--err-txt);border-color:var(--err);background:var(--err-bg)}
.opt.rev-skip{cursor:default;opacity:.45}
.opt.locked{cursor:default}
.mhint{font-size:11px;color:var(--muted);margin-bottom:9px;font-style:italic}

/* Matching */
.mtbl{width:100%;border-collapse:separate;border-spacing:0 7px}
.mdesc{font-size:13px;line-height:1.5;padding-right:8px;width:52%}
.msel select{width:100%;padding:6px 8px;border:1.5px solid var(--bdr2);border-radius:var(--rs);background:var(--surf);color:var(--text);font-size:13px;cursor:pointer}
.msel select.ok{border-color:var(--ok);background:var(--ok-bg)}
.msel select.err{border-color:var(--err);background:var(--err-bg)}
.mico{width:26px;text-align:center;font-size:14px}

/* Ordering */
.olist{list-style:none;display:flex;flex-direction:column;gap:6px}
.oitem{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:var(--rs);border:1.5px solid var(--bdr);background:var(--surf2);cursor:grab;user-select:none;transition:border-color .12s,background .12s}
.oitem:active{cursor:grabbing}
.oitem.dragging{opacity:.5;border-color:var(--acc)}
.oitem.drag-over{border-color:var(--acc);background:var(--acc-bg)}
.oitem.rev-ok{border-color:var(--ok);background:var(--ok-bg);cursor:default}
.oitem.rev-err{border-color:var(--err);background:var(--err-bg);cursor:default}
.oitem.locked{cursor:default}
.onum{width:23px;height:23px;border-radius:50%;background:var(--bdr);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0}
.oitem.rev-ok .onum{background:var(--ok);color:#fff}
.oitem.rev-err .onum{background:var(--err);color:#fff}
.ogrip{color:var(--hint);font-size:13px;flex-shrink:0}
.otxt2{font-size:13px;line-height:1.5;flex:1;min-width:0;word-break:break-word}

/* Banner */
.banner{padding:10px 13px;border-radius:var(--rs);font-size:14px;font-weight:600;margin-bottom:10px;line-height:1.5}
.ban-ok{background:var(--ok-bg);color:var(--ok-txt)}
.ban-err{background:var(--err-bg);color:var(--err-txt)}
.ban-info{background:var(--info-bg);color:var(--info-txt)}
.ban-retry{background:var(--warn-bg);color:var(--warn-txt)}

/* Explanation */
.expl{background:var(--surf);border-radius:var(--r);border:1px solid var(--bdr);padding:14px 18px;margin-bottom:10px}
.xhdr{font-size:13px;font-weight:700;margin-bottom:9px}
.xcpt{background:var(--info-bg);color:var(--info-txt);border-radius:var(--rs);padding:8px 11px;font-size:13px;margin-bottom:11px;line-height:1.5}
.xrow{display:flex;gap:8px;margin-bottom:7px;align-items:flex-start}
.xico{font-size:13px;flex-shrink:0;width:18px;margin-top:2px}
.xtxt{font-size:13px;line-height:1.6}
.xtxt.bok{color:var(--ok-txt)}.xtxt.berr{color:var(--err-txt)}

/* Jump */
input.jmp{border:1px solid var(--bdr2);border-radius:var(--rs);background:var(--surf);color:var(--text);padding:5px 8px;font-size:12px;width:54px;text-align:center}

/* Stats grid */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:14px}
.sc{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:11px;text-align:center}
.sn{font-size:22px;font-weight:700;margin-bottom:2px}
.sl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.sn-ok{color:var(--ok)}.sn-err{color:var(--err)}.sn-acc{color:var(--acc)}
.qmap{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:16px}
.qd{width:26px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer;border:1px solid var(--bdr);background:var(--surf2);color:var(--hint);font-weight:700;transition:transform .1s}
.qd:hover{transform:scale(1.2);z-index:1}
.qd.cur{border-color:var(--acc);color:var(--acc);background:var(--acc-bg)}
.qd.dok{background:var(--ok-bg);border-color:var(--ok);color:var(--ok-txt)}
.qd.derr{background:var(--err-bg);border-color:var(--err);color:var(--err-txt)}
.ftbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.ftbl th{text-align:left;padding:6px 9px;border-bottom:2px solid var(--bdr2);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.ftbl td{padding:6px 9px;border-bottom:1px solid var(--bdr);vertical-align:middle}
.ftbl tr:hover td{background:var(--surf2)}
.fdot{display:inline-flex;width:15px;height:15px;border-radius:50%;align-items:center;justify-content:center;font-size:9px;font-weight:700;margin:1px}
.dok2{background:var(--ok-bg);color:var(--ok-txt)}
.derr2{background:var(--err-bg);color:var(--err-txt)}
.dskip{background:var(--surf2);border:1px solid var(--bdr);color:var(--hint)}
.try-sec{background:var(--surf);border-radius:var(--r);border:1px solid var(--bdr);padding:14px 16px;margin-bottom:10px}
.try-hdr{font-weight:600;font-size:14px;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.vtabs{display:flex;gap:0;margin-bottom:14px;border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.vtab{flex:1;padding:8px 4px;background:transparent;border:none;color:var(--muted);font-size:11px;cursor:pointer;font-weight:600;white-space:nowrap}
.vtab.act{background:var(--acc);color:#000}
.vtab:hover:not(.act){background:var(--surf2);color:var(--text)}
.swrap{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;padding:12px}
.spin{width:14px;height:14px;border:2px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:28px;color:var(--muted);font-size:14px}
.h2{font-size:15px;font-weight:700;margin-bottom:12px}

/* ── MOCK EXAM styles ── */
.exam-timer{
  font-family:monospace;font-size:18px;font-weight:700;
  padding:5px 12px;border-radius:var(--rs);
  background:var(--surf2);border:1.5px solid var(--bdr2);
  min-width:70px;text-align:center;flex-shrink:0;
}
.exam-timer.warn{background:var(--warn-bg);color:var(--warn-txt);border-color:var(--warn-txt)}
.exam-timer.crit{background:var(--err-bg);color:var(--err-txt);border-color:var(--err);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.exam-qmap{display:flex;flex-wrap:wrap;gap:3px;padding:10px;background:var(--surf);border-radius:var(--r);border:1px solid var(--bdr);margin-bottom:12px}
.eqd{width:28px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer;border:1px solid var(--bdr);background:var(--surf2);color:var(--hint);font-weight:700}
.eqd:hover{opacity:.8}
.eqd.ecur{border-color:var(--acc);color:var(--acc);background:var(--acc-bg)}
.eqd.edone{background:var(--info-bg);border-color:var(--info-txt);color:var(--info-txt)}
.eqd.eflag{background:var(--warn-bg);border-color:var(--warn-txt);color:var(--warn-txt)}
.eqd.eok{background:var(--ok-bg);border-color:var(--ok);color:var(--ok-txt)}
.eqd.eerr{background:var(--err-bg);border-color:var(--err);color:var(--err-txt)}
.flag-btn{padding:5px 10px;border-radius:var(--rs);border:1px solid var(--bdr2);background:transparent;color:var(--muted);font-size:12px;cursor:pointer}
.flag-btn.on{background:var(--warn-bg);color:var(--warn-txt);border-color:var(--warn-txt)}
.score-circle{width:110px;height:110px;border-radius:50%;border:6px solid var(--bdr);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;flex-direction:column}
.score-circle.pass{border-color:var(--ok)}
.score-circle.fail{border-color:var(--err)}
.score-num{font-size:26px;font-weight:700}
.score-sub{font-size:11px;color:var(--muted)}

/* Exam result history rows */
.exam-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:var(--rs);border:1px solid var(--bdr);background:var(--surf2);margin-bottom:7px;gap:8px;flex-wrap:wrap}
.exam-row-pass{border-color:var(--ok);background:var(--ok-bg)}
.exam-row-fail{border-color:var(--err);background:var(--err-bg)}

/* Auth */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.modal{background:var(--surf);border-radius:var(--r);padding:22px;max-width:380px;width:100%;border:1px solid var(--bdr2)}
.modal h2{font-size:16px;font-weight:700;margin-bottom:5px}
.minfo{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6}
.mlabel{font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
.minput{width:100%;border:1px solid var(--bdr2);border-radius:var(--rs);background:var(--surf2);color:var(--text);padding:9px 11px;font-size:14px;margin-bottom:11px;font-family:inherit}
.minput:focus{outline:none;border-color:var(--acc)}
.errbox{background:var(--err-bg);color:var(--err-txt);border-radius:var(--rs);padding:9px 12px;font-size:13px;margin-top:9px;display:none;line-height:1.5}
.link-btn{background:none;border:none;color:var(--acc);cursor:pointer;font-size:13px;padding:0;text-decoration:underline;text-underline-offset:2px}

/* ── Category system ── */
.cat-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px;padding:10px 12px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r)}
.cat-bar-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;flex-shrink:0}
.cat-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--bdr2);background:var(--surf2);color:var(--text);transition:all .15s;white-space:nowrap}
.cat-pill:hover{border-color:var(--acc);color:var(--acc)}
.cat-pill.active{background:var(--acc);color:#000;border-color:var(--acc)}
.cat-pill.all-pill.active{background:var(--text);color:var(--surf);border-color:var(--text)}
.cat-tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;background:var(--info-bg);color:var(--info-txt);border:1px solid var(--info-txt)}
.cat-tag .rm{cursor:pointer;opacity:.6;font-size:10px;margin-left:1px}
.cat-tag .rm:hover{opacity:1}
.cat-panel{background:var(--surf2);border:1.5px solid var(--bdr2);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.cat-panel-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.cat-input-row{display:flex;gap:6px;margin-bottom:8px}
.cat-input{flex:1;border:1px solid var(--bdr2);border-radius:var(--rs);background:var(--surf);color:var(--text);padding:6px 9px;font-size:13px;font-family:inherit}
.cat-input:focus{outline:none;border-color:var(--acc)}
.cat-existing{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.cat-existing-btn{padding:3px 10px;border-radius:99px;font-size:12px;font-weight:600;border:1.5px solid var(--bdr2);background:var(--surf);color:var(--text);cursor:pointer}
.cat-existing-btn:hover{border-color:var(--acc);color:var(--acc)}
.cat-existing-btn.assigned{background:var(--info-bg);color:var(--info-txt);border-color:var(--info-txt)}
.rand-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:var(--rs);border:1px solid var(--bdr2);background:var(--surf2);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.rand-btn:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-bg)}
</style>

<body>

<!-- Auth -->
<div class="overlay" id="authOverlay">
  <div class="modal">
    <h2>&#128274; AWS AI Quiz</h2>
    <p class="minfo" id="authDesc">Sign in with your username and password.</p>
    <label class="mlabel">Username</label>
    <input class="minput" id="authUser" type="text" placeholder="e.g. frankie42" autocomplete="username" spellcheck="false">
    <label class="mlabel">Password</label>
    <input class="minput" id="authPwd" type="password" placeholder="at least 6 characters" autocomplete="current-password">
    <button class="btn-acc" id="authBtn" onclick="doAuth()">Sign in &#8594;</button>
    <div style="text-align:center;margin-top:11px">
      <button class="link-btn" id="authSwitch" onclick="toggleMode()">No account yet? Create one</button>
    </div>
    <div class="errbox" id="authErr"></div>
  </div>
</div>

<!-- Header -->
<div class="hdr" id="hdrEl" style="display:none">
  <div class="hdr-logo">AWS <em>AI</em></div>
  <div class="hdr-sync">

// ── State ──────────────────────────────────────────────────────────────────
function mkS(){return{idx:0,sel:null,matchSel:{},orderItems:null,revealed:false,expl:null,loading:false,
  view:'quiz',tries:[],activeTry:1,loaded:false,cache:{},focusFilter:'all',focusSort:'miss',
  exams:[],
  // Retry mode
  retryMode:false,retryQueue:[],retryIdx:0,retrySel:null,retryMatchSel:{},retryOrderItems:null,
  retryRevealed:false,
  // Exam
  exam:null,
  explanations:{},
  adminMode:false,
  corrections:{},
  // Categories
  categories:{},   // qid -> [catName, ...]
  categoryList:[], // all known category names
  activeCat:'all', // current filter
  catPanelOpen:null // qid of open cat panel
  };}
var S=mkS();

function getTD(){
  var t=S.tries.find(function(t){return t.tryNum===S.activeTry;});
  if(!t){t={tryNum:S.activeTry,date:new Date().toLocaleDateString('en-GB'),answers:{}};S.tries.push(t);}
  return t;
}
function getStats(tn){
  var t=S.tries.find(function(t){return t.tryNum===tn;});if(!t)return{answered:0,correct:0,incorrect:0,pct:0};
  var a=Object.keys(t.answers).length,ok=0;
  Object.entries(t.answers).forEach(function(kv){var q=QS.find(function(q){return q.id===parseInt(kv[0]);});if(q&&isOK(q,kv[1]))ok++;});
  return{answered:a,correct:ok,incorrect:a-ok,pct:a?Math.round(ok/a*100):0};
}
function isOK(q,ans){
  if(q.type==='single')return Array.isArray(ans)?ans[0]===q.correct[0]:ans===q.correct[0];
  if(q.type==='multi'){var a=[].concat(ans).sort(),c=[].concat(q.correct).sort();return JSON.stringify(a)===JSON.stringify(c);}
  if(q.type==='matching')return q.pairs.every(function(p,i){return ans[i]===p.correct;});
  if(q.type==='ordering')return Array.isArray(ans)&&ans.every(function(item,i){return item===q.correct[i];});
  return false;
}
function maxT(){return Math.max.apply(null,S.tries.map(function(t){return t.tryNum;}).concat([1]));}
function switchTry(v){S.activeTry=parseInt(v);S.retryMode=false;var td=getTD();S.idx=0;for(var i=0;i<QS.length;i++){if(!td.answers[QS[i].id]){S.idx=i;break;}}rst();sched();updTryBtn();render();}
function newTry(){S.activeTry=maxT()+1;S.idx=0;S.view='quiz';S.retryMode=false;rst();sched();updTryBtn();render();}
function setView(v){S.view=v;S.retryMode=false;render();}
function goTo(idx){S.idx=idx;S.retryMode=false;rst();render();}

function rst(){
  S.sel=null;S.matchSel={};S.orderItems=null;S.revealed=false;S.expl=null;S.loading=false;S.catPanelOpen=null;
  var q=QS[S.idx];if(!q)return;
  var prev=getTD().answers[q.id];
  if(prev){
    if(q.type==='single'||q.type==='multi')S.sel=prev;
    else if(q.type==='matching')S.matchSel=JSON.parse(JSON.stringify(prev));
    else if(q.type==='ordering')S.orderItems=prev.slice();
    S.revealed=true;if(S.cache[q.id])S.expl=S.cache[q.id];
  }else{if(q.type==='ordering')S.orderItems=q.items.slice();}
}

// ── Retry mode ─────────────────────────────────────────────────────────────
// Enter retry: give queue of question indices from focus/stats
function startRetry(queueIdxs){
  if(!queueIdxs||!queueIdxs.length)return;
  S.retryMode=true;S.retryQueue=queueIdxs;S.retryIdx=0;
  S.retrySel=null;S.retryMatchSel={};S.retryOrderItems=null;S.retryRevealed=false;
  var q=QS[queueIdxs[0]];
  if(q&&q.type==='ordering')S.retryOrderItems=q.items.slice();
  S.view='quiz';render();
}

function retrySubmit(){
  var qi=S.retryQueue[S.retryIdx];var q=QS[qi];
  var ans=null;
  if(q.type==='single'||q.type==='multi'){if(!S.retrySel||(Array.isArray(S.retrySel)&&!S.retrySel.length))return;ans=S.retrySel;}
  else if(q.type==='matching'){if(Object.keys(S.retryMatchSel).length<q.pairs.length)return;ans=JSON.parse(JSON.stringify(S.retryMatchSel));}
  else if(q.type==='ordering'){ans=S.retryOrderItems.slice();}
  S.retryRevealed=true;render();
}

function retryNext(){
  S.retryIdx++;
  if(S.retryIdx>=S.retryQueue.length){S.retryMode=false;setView('focus');return;}
  var q=QS[S.retryQueue[S.retryIdx]];
  S.retrySel=null;S.retryMatchSel={};S.retryOrderItems=null;S.retryRevealed=false;
  if(q&&q.type==='ordering')S.retryOrderItems=q.items.slice();
  render();
}

function canRetrySubmit(q){
  if(q.type==='single')return !!S.retrySel;
  if(q.type==='multi')return Array.isArray(S.retrySel)&&S.retrySel.length>0;
  if(q.type==='matching')return Object.keys(S.retryMatchSel).length===q.pairs.length;
  if(q.type==='ordering')return !!S.retryOrderItems&&S.retryOrderItems.length===q.items.length;
  return false;
}


// ── Category helpers ───────────────────────────────────────────────────────
function getCats(qid){return S.categories[qid]||[];}
function hasCat(qid,cat){return getCats(qid).includes(cat);}
function addCat(qid,cat){
  cat=cat.trim();if(!cat)return;
  if(!S.categories[qid])S.categories[qid]=[];
  if(!S.categories[qid].includes(cat))S.categories[qid].push(cat);

}
function removeCat(qid,cat){
  if(!S.categories[qid])return;
  S.categories[qid]=S.categories[qid].filter(function(c){return c!==cat;});
  if(S.categories[qid].length===0)delete S.categories[qid];
  sched();render();
}
function deleteCat(cat){
  // Remove from all questions
  Object.keys(S.categories).forEach(function(qid){
    S.categories[qid]=S.categories[qid].filter(function(c){return c!==cat;});
    if(S.categories[qid].length===0)delete S.categories[qid];

// ── Filtered question list ─────────────────────────────────────────────────
function getFilteredQS(){
  if(!S.activeCat||S.activeCat==='all')return QS;
  return QS.filter(function(q){return hasCat(q.id,S.activeCat);});
}
function getFilteredIdx(){
  var fqs=getFilteredQS();
  var q=QS[S.idx];
  var fi=fqs.findIndex(function(qq){return qq.id===q.id;});
  return{fqs:fqs,fi:fi};
}

// ── Random unanswered ──────────────────────────────────────────────────────
function goRandom(){
  var td=getTD();
  var fqs=getFilteredQS();
  var unanswered=fqs.filter(function(q){return !td.answers[q.id];});
  if(!unanswered.length){
    // All answered in this filter — just pick any random one
    unanswered=fqs;
  }
  if(!unanswered.length)return;
  var pick=unanswered[Math.floor(Math.random()*unanswered.length)];
  var gi=QS.findIndex(function(q){return q.id===pick.id;});
  if(gi>=0)goTo(gi);
}

// ── Submit (normal study) ──────────────────────────────────────────────────
function submit(){
  var q=QS[S.idx];if(S.revealed)return;
  var ans=null;
  if(q.type==='single'||q.type==='multi'){if(!S.sel||(Array.isArray(S.sel)&&!S.sel.length))return;ans=S.sel;}
  else if(q.type==='matching'){if(Object.keys(S.matchSel).length<q.pairs.length)return;ans=JSON.parse(JSON.stringify(S.matchSel));}
  else if(q.type==='ordering'){ans=S.orderItems.slice();}
  getTD().answers[q.id]=ans;sched();updTryBtn();
  S.revealed=true;S.loading=true;render();
  if(S.cache[q.id]){S.expl=S.cache[q.id];S.loading=false;render();return;}
  fetchX(q);
}
function seeExpl(){var q=QS[S.idx];if(S.cache[q.id]){S.expl=S.cache[q.id];render();return;}S.loading=true;render();fetchX(q);}

async function fetchX(q){
  // Check offline explanations first
  if(S.explanations && S.explanations[q.id]){
    S.expl=S.explanations[q.id]; S.cache[q.id]=S.expl; S.loading=false; render(); return;
  }
  var prompt='';
  if(q.type==='single'||q.type==='multi'){
    var ol=Object.entries(q.options).map(function(kv){return kv[0]+'. '+kv[1];}).join('\n');
    var ok2=Object.keys(q.options).join(', ');
    prompt='AWS AI Practitioner exam question:\n'+q.stem+'\n'+ol+'\nCorrect: '+q.correct.join(', ')+'\nReturn ONLY compact JSON, no markdown. Include ALL options ('+ok2+'). Format: {"concept":"AWS concept","A":{"ok":true,"why":"reason"},"B":{"ok":false,"why":"reason"}} — ok=true means correct.';
  }else if(q.type==='matching'){
    var pl=q.pairs.map(function(p,i){return (i+1)+'. '+p.description+' -> '+p.correct;}).join('\n');
    prompt='AWS matching question:\n'+q.stem+'\nCorrect:\n'+pl+'\nReturn ONLY compact JSON: {"concept":"...","explanations":[{"description":"...","correct":"...","why":"..."}]}';
  }else if(q.type==='ordering'){
    var sl=q.correct.map(function(s,i){return 'Step '+(i+1)+': '+s;}).join('\n');
    prompt='AWS ordering question:\n'+q.stem+'\nCorrect order:\n'+sl+'\nReturn ONLY compact JSON: {"concept":"...","steps":[{"step":"...","why":"..."}]}';
  }
  try{
    var r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':'YOUR_ANTHROPIC_KEY','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        system:'AWS expert. Return ONLY valid compact JSON. No markdown, no backticks.',messages:[{role:'user',content:prompt}]})});
    var data=await r.json();var txt=(data.content||[]).map(function(c){return c.text||'';}).join('').trim();
    S.expl=JSON.parse(txt);S.cache[q.id]=S.expl;
  }catch(e){S.expl={error:true};}
  S.loading=false;render();
}

// ── Mock exam ──────────────────────────────────────────────────────────────
var EXAM_SECS=5400; // 90 minutes

function buildExamQuestions(){
  var targets={single:58,multi:2,matching:4,ordering:1};
  var result=[];
  Object.keys(targets).forEach(function(t){
    var pool=QS.filter(function(q){return q.type===t;}).slice();
    pool.sort(function(){return Math.random()-.5;});
    result=result.concat(pool.slice(0,targets[t]));
  });
  result.sort(function(){return Math.random()-.5;});
  return result;
}

function startExam(){
  if(examInterval)clearInterval(examInterval);
  var qs=buildExamQuestions();
  S.exam={
    questions:qs,answers:{},flagged:{},idx:0,
    startTime:Date.now(),submitted:false,
    sel:null,matchSel:{},orderItems:qs[0]&&qs[0].type==='ordering'?qs[0].items.slice():null
  };
  S.view='exam';render();
  examInterval=setInterval(tickExamTimer,1000);
}

function tickExamTimer(){
  if(!S.exam||S.exam.submitted){clearInterval(examInterval);return;}
  var elapsed=Math.floor((Date.now()-S.exam.startTime)/1000);
  var rem=Math.max(0,EXAM_SECS-elapsed);
  var el=document.getElementById('examTimerEl');
  if(el){
    var m=Math.floor(rem/60),s=rem%60;
    el.textContent=m+':'+(s<10?'0':'')+s;
    el.className='exam-timer'+(rem<300?' crit':rem<600?' warn':'');
  }
  if(rem===0)autoSubmitExam();
}

function examGoTo(idx){
  saveExamCurrentAnswer();
  S.exam.idx=idx;
  var q=S.exam.questions[idx];
  S.exam.sel=S.exam.answers[q.id]||null;
  S.exam.matchSel=S.exam.answers[q.id]?JSON.parse(JSON.stringify(S.exam.answers[q.id])):{};
  S.exam.orderItems=S.exam.answers[q.id]?S.exam.answers[q.id].slice():(q.type==='ordering'?q.items.slice():null);
  render();
}

function saveExamCurrentAnswer(){
  if(!S.exam||S.exam.submitted)return;
  var q=S.exam.questions[S.exam.idx];if(!q)return;
  if((q.type==='single'||q.type==='multi')&&S.exam.sel&&S.exam.sel.length)S.exam.answers[q.id]=S.exam.sel.slice();
  else if(q.type==='matching'&&Object.keys(S.exam.matchSel).length===q.pairs.length)S.exam.answers[q.id]=JSON.parse(JSON.stringify(S.exam.matchSel));
  else if(q.type==='ordering'&&S.exam.orderItems)S.exam.answers[q.id]=S.exam.orderItems.slice();
}

function autoSubmitExam(){submitExam(true);}

function submitExam(auto){
  saveExamCurrentAnswer();
  if(!auto){
    var unanswered=S.exam.questions.filter(function(q){return !S.exam.answers[q.id];}).length;
    var msg=unanswered>0?'You have '+unanswered+' unanswered question'+(unanswered>1?'s':'')+'. Submit anyway?':'Submit the exam now?';
    if(!confirm(msg))return;
  }
  clearInterval(examInterval);
  S.exam.submitted=true;
  // Calculate results
  var correct=0,total=S.exam.questions.length;
  S.exam.questions.forEach(function(q){if(S.exam.answers[q.id]&&isOK(q,S.exam.answers[q.id]))correct++;});
  var elapsed=Math.floor((Date.now()-S.exam.startTime)/1000);
  var score=Math.round(100+(correct/total)*900);
  var result={date:new Date().toLocaleDateString('en-GB'),score:score,passed:score>=700,correct:correct,total:total,elapsed:elapsed,answers:JSON.parse(JSON.stringify(S.exam.answers)),qids:S.exam.questions.map(function(q){return q.id;})};
  S.exams.push(result);sched();render();
}

function exitExam(){
  if(!confirm('Exit exam? Your progress will not be saved.'))return;
  clearInterval(examInterval);S.exam=null;setView('examSetup');
}

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function qa(s){return String(s||'').replace(/'/g,'&#39;');}
function badge(t){
  var m={single:['Single','tb-s'],multi:['Multi','tb-m'],matching:['Matching','tb-match'],ordering:['Ordering','tb-ord']};
  var v=m[t]||['?','tb-s'];return '<span class="tbadge '+v[1]+'">'+v[0]+'</span>';
}
function canSub(q){
  if(q.type==='single')return !!S.sel;
  if(q.type==='multi')return Array.isArray(S.sel)&&S.sel.length>0;
  if(q.type==='matching')return Object.keys(S.matchSel).length===q.pairs.length;
  if(q.type==='ordering')return !!S.orderItems&&S.orderItems.length===q.items.length;
  return false;
}
function fmtTime(secs){var m=Math.floor(secs/60),s=secs%60;return m+'m '+(s<10?'0':'')+s+'s';}

// ── Render ─────────────────────────────────────────────────────────────────
function render(){
  var m=document.getElementById('main');if(!m||!S.loaded)return;
  if(S.view==='stats'){rStats(m);return;}
  if(S.view==='focus'){rFocus(m);return;}
  if(S.view==='sync'){rSync(m);return;}
  if(S.view==='examSetup'){rExamSetup(m);return;}
  if(S.view==='exam'){rExam(m);return;}
  if(S.retryMode){rRetry(m);return;}
  rQuiz(m);
}

// ── Quiz view ──────────────────────────────────────────────────────────────
function rQuiz(m){
  var q=QS[S.idx],td=getTD(),st=getStats(S.activeTry);
  var f=getFilteredIdx(),fqs=f.fqs,fi=f.fi;
  var totalQ=fqs.length;
  var ansCount=fqs.filter(function(qq){return td.answers[qq.id];}).length;
  var unansweredCount=totalQ-ansCount;
  var pct=totalQ>0?Math.round((fi+1)/totalQ*100):0;
  var isAns=!!td.answers[q?q.id:0],locked=S.revealed||isAns;
  var nCls='btn-nav'+(S.revealed||isAns?' btn-nav-next':'');
  var prevQ=fi>0?QS.findIndex(function(qq){return qq.id===fqs[fi-1].id;}):null;
  var nextQ=fi<fqs.length-1?QS.findIndex(function(qq){return qq.id===fqs[fi+1].id;}):null;

  // Category filter bar
  var h='';
  if(S.categoryList&&S.categoryList.length){
    h+='<div class="cat-bar"><span class="cat-bar-label">&#127991; Filter:</span>';
    h+='<span class="cat-pill all-pill'+(S.activeCat==='all'?' active':'')+'" onclick="S.activeCat=\'all\';S.idx=0;rst();render()">All ('+QS.length+')</span>';
    S.categoryList.forEach(function(cat){
      var cnt=QS.filter(function(qq){return hasCat(qq.id,cat);}).length;
      h+='<span class="cat-pill'+(S.activeCat===cat?' active':'')+'" onclick="S.activeCat=\''+cat.replace(/'/g,"\'")+'\';;var first=getFilteredQS()[0];if(first){S.idx=QS.findIndex(function(qq){return qq.id===first.id;});}rst();render()">'+esc(cat)+' ('+cnt+')</span>';
    });
    h+='</div>';
  }

  if(!totalQ){
    m.innerHTML=h+'<div class="empty">No questions in this category yet. Tag some questions with &#127991; to get started!</div>';
    return;
  }

  h+='<div class="prog-wrap"><div class="prog-meta"><span>Q <strong>'+(fi+1)+'</strong> / '+totalQ+(S.activeCat!=='all'?' <span style="font-size:10px;color:var(--info-txt)">['+esc(S.activeCat)+']</span>':'')+'</span>'
     +'<span style="display:flex;align-items:center;gap:6px">'+ansCount+' answered'
     +'<button class="rand-btn" onclick="goRandom()" title="Jump to random unanswered question">&#127922; Random'+(unansweredCount>0?' ('+unansweredCount+')':'')+'</button>'
     +'</span></div>'
     +'<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div></div>';
  h+='<div class="nav-bar">'
    +'<div class="nav-prev"><button class="btn-nav"'+(fi===0?' disabled':'')+' onclick="goTo('+(prevQ!==null?prevQ:0)+')">&#8592; Prev</button></div>'
    +'<div class="nav-stats"><span class="pill pill-ok">&#10003; '+st.correct+'</span><span class="pill pill-err">&#10007; '+st.incorrect+'</span><span class="pill pill-neu">'+unansweredCount+' left</span></div>'
    +'<div class="nav-next"><button class="btn-nav '+nCls+'"'+(fi===fqs.length-1?' disabled':'')+' onclick="goTo('+(nextQ!==null?nextQ:QS.length-1)+')">Next &#8594;</button></div>'
    +'</div>';

  if(!q){m.innerHTML=h+'<div class="empty">No question.</div>';return;}

  var q=getQ(QS[S.idx]);
  h+='<div class="card">';
  // Category tags for this question
  var qCats=getCats(q.id);
  var catTagsHtml=qCats.map(function(c){return '<span class="cat-tag">'+esc(c)+'<span class="rm" onclick="removeCat('+q.id+',\''+c.replace(/'/g,"\'")+'\')" title="Remove">&#215;</span></span>';}).join(' ');
  h+='<div class="qnum">Q'+q.id+' '+badge(q.type)
    +' <button class="rand-btn" style="padding:2px 7px;font-size:11px;margin-left:4px;'+(S.catPanelOpen===q.id?'border-color:var(--acc);color:var(--acc);background:var(--acc-bg)':'')+'" onclick="toggleCatPanel('+q.id+')" title="Tag this question with a category">&#127991; Tag'+(qCats.length?' ('+qCats.length+')':'')+'</button>'
    +(S.adminMode?' <button class="btn" style="margin-left:auto;font-size:11px;padding:3px 8px;color:var(--acc);border-color:var(--acc)" onclick="openEditModal('+q.id+')">&#9999; Edit</button>':'')
    +'</div>';
  if(qCats.length)h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">'+catTagsHtml+'</div>';
  // Category panel
  if(S.catPanelOpen===q.id){
    h+='<div class="cat-panel"><div class="cat-panel-title">&#127991; Add to category</div>'
      +'<div class="cat-input-row">'
      +'<input class="cat-input" id="catNewInput" type="text" placeholder="New category name&#8230;" onkeydown="if(event.key===\'Enter\'){var v=document.getElementById(\'catNewInput\').value;addCat('+q.id+',v)}">'
      +'<button class="btn btn-pri" onclick="var v=document.getElementById(\'catNewInput\').value;addCat('+q.id+',v)">Add</button>'
      +'</div>';
    if(S.categoryList.length){
      h+='<div style="font-size:11px;color:var(--muted);margin-bottom:5px">Existing categories — click to toggle:</div><div class="cat-existing">';
      S.categoryList.forEach(function(cat){
        var assigned=hasCat(q.id,cat);
        h+='<button class="cat-existing-btn'+(assigned?' assigned':'')+'" onclick="'+(assigned?'removeCat':'addCat')+'('+q.id+',\''+cat.replace(/'/g,"\'")+'\')">'+esc(cat)+(assigned?' &#10003;':'')+'</button>';
      });
      h+='</div>';
    }
    h+='</div>';
  }
  h+='<div class="stem">'+esc(q.stem)+'</div>';
  if(q.type==='single')h+=rSingle(q,locked,td.answers[q.id]);
  else if(q.type==='multi')h+=rMulti(q,locked,td.answers[q.id]);
  else if(q.type==='matching')h+=rMatch(q,locked,td.answers[q.id]);
  else if(q.type==='ordering')h+=rOrder(q,locked,td.answers[q.id]);
  h+='</div>';

  if(S.revealed){
    var ua=isAns?td.answers[q.id]:(q.type==='matching'?S.matchSel:q.type==='ordering'?S.orderItems:S.sel);
    var ok=isOK(q,ua);
    if(q.type==='single'||q.type==='multi'){
      var da=Array.isArray(ua)?ua.join(', '):String(ua||'');
      h+=ok?'<div class="banner ban-ok">&#10003; Correct! You answered: <strong>'+esc(da)+'</strong></div>'
           :'<div class="banner ban-err">&#10007; Incorrect. You chose: <strong>'+esc(da)+'</strong> &middot; Correct: <strong>'+esc(q.correct.join(', '))+'</strong></div>';
    }else{h+=ok?'<div class="banner ban-ok">&#10003; Correct!</div>':'<div class="banner ban-err">&#10007; Incorrect &mdash; see below.</div>';}
    h+=rExpl(q);
  }
  if(isAns&&!S.revealed)h+='<button class="btn" style="margin-bottom:10px;width:100%" onclick="seeExpl()">See Explanation</button>';
  if(!isAns&&!S.revealed)h+='<button class="btn-acc" onclick="submit()"'+(canSub(q)?'':' disabled')+'>Submit Answer</button>';

  h+='<div style="display:flex;justify-content:center;align-items:center;gap:6px;margin-top:14px">'
    +'<span style="font-size:12px;color:var(--muted)">Jump:</span>'
    +'<input class="jmp" type="number" min="1" max="'+QS.length+'" value="'+(S.idx+1)+'" id="jmpI" onkeydown="if(event.key===\'Enter\'){var v=parseInt(this.value)-1;if(v>=0&&v<'+QS.length+')goTo(v)}">'
    +'<span style="font-size:12px;color:var(--muted)">/'+QS.length+'</span>'
    +'<button class="btn" onclick="var v=parseInt(document.getElementById(\'jmpI\').value)-1;if(v>=0&&v<'+QS.length+')goTo(v)">Go</button>'
    +'</div>';

  m.innerHTML=h;
  if(q.type==='ordering')attachDrag(q,false);
}

// ── Retry view (active recall: answer before seeing result) ────────────────
function rRetry(m){
  var qi=S.retryQueue[S.retryIdx];
  var q=QS[qi];
  var td=getTD();
  var origAns=td.answers[q.id];

  var h='<div class="banner ban-info" style="margin-bottom:14px">'
       +'&#128260; Retry mode: Q'+(S.retryIdx+1)+' of '+S.retryQueue.length
       +' <button class="btn" style="margin-left:auto" onclick="S.retryMode=false;setView(\'focus\')">Exit retry</button>'
       +'</div>';

  h+='<div class="card"><div class="qnum">Q'+q.id+' '+badge(q.type)+'<span style="color:var(--muted);font-size:10px;font-weight:400">Try again without seeing the answer</span></div>'
    +'<div class="stem">'+esc(q.stem)+'</div>';

  if(!S.retryRevealed){
    // Show fresh — no previous state visible
    if(q.type==='single')h+=rRetryOpts(q);
    else if(q.type==='multi')h+=rRetryMultiOpts(q);
    else if(q.type==='matching')h+=rRetryMatchOpts(q);
    else if(q.type==='ordering')h+=rRetryOrderOpts(q);
    h+='</div>';
    h+='<button class="btn-acc" onclick="retrySubmit()"'+(canRetrySubmit(q)?'':' disabled')+'>Check my answer</button>';
  } else {
    // Show result comparison
    var ra=S.retrySel||(q.type==='matching'?S.retryMatchSel:q.type==='ordering'?S.retryOrderItems:null);
    var retryOK=isOK(q,ra);

    // Show options locked with colours
    if(q.type==='single'){var rawR=S.retrySel;var uaR=Array.isArray(rawR)?rawR[0]:rawR;h+=rLockedOpts(q,uaR);}
    else if(q.type==='multi'){h+=rLockedMultiOpts(q,S.retrySel||[]);}
    else if(q.type==='matching')h+=rMatch(q,true,S.retryMatchSel);
    else if(q.type==='ordering')h+=rOrder(q,true,S.retryOrderItems);
    h+='</div>';

    // Result banner with comparison
    if(retryOK){
      h+='<div class="banner ban-ok">&#10003; Retry correct! Great recall.</div>';
    }else{
      var origDA=Array.isArray(origAns)?origAns.join(', '):String(origAns||'?');
      var retDA=Array.isArray(ra)?ra.join(', '):String(ra||'?');
      h+='<div class="banner ban-err">&#10007; Retry wrong. <br><span style="font-size:12px;font-weight:400">Your retry: <strong>'+esc(retDA)+'</strong> &middot; Your original: <strong>'+esc(origDA)+'</strong> &middot; Correct: <strong>'+esc(q.correct.join?q.correct.join(', '):q.correct)+'</strong></span></div>';
    }

    var isLast=S.retryIdx>=S.retryQueue.length-1;
    h+='<button class="btn-acc" onclick="retryNext()">'+(isLast?'Finish retry':'Next question &#8594;')+'</button>';
  }

  m.innerHTML=h;
  if(q.type==='ordering'&&!S.retryRevealed)attachDrag(q,true);
}

// Retry option renderers (no locked classes, no prev state)
function rRetryOpts(q){
  var sel=S.retrySel;var ua=Array.isArray(sel)?sel[0]:(sel||null);var h='';
  Object.entries(q.options).forEach(function(kv){
    var L=kv[0],cls='opt'+(L===ua?' sel':'');
    h+='<div class="'+cls+'" data-icon="'+L+'" onclick="S.retrySel=[\''+qa(L)+'\'];render()">'+esc(kv[1])+'</div>';
  });
  return h;
}
function rRetryMultiOpts(q){
  var ua=Array.isArray(S.retrySel)?S.retrySel:[];var n=q.correct.length;
  var h='<div class="mhint">Select <strong>'+n+'</strong> answer'+(n>1?'s':'')+'</div>';
  Object.entries(q.options).forEach(function(kv){
    var L=kv[0],cls='opt'+(ua.includes(L)?' sel':''),icon=ua.includes(L)?'&#10003;':L;
    h+='<div class="'+cls+'" data-icon="'+icon+'" onclick="var a=S.retrySel?S.retrySel.slice():[];var i=a.indexOf(\''+qa(L)+'\');if(i>=0)a.splice(i,1);else a.push(\''+qa(L)+'\');S.retrySel=a;render()">'+esc(kv[1])+'</div>';
  });
  return h;
}
function rRetryMatchOpts(q){
  var us=S.retryMatchSel,h='<table class="mtbl">';
  q.pairs.forEach(function(p,i){
    var ch=us[i]||'';
    h+='<tr><td class="mdesc">'+esc(p.description)+'</td><td class="mico"></td>'
      +'<td class="msel"><select onchange="S.retryMatchSel['+i+']=this.value;render()">'
      +'<option value="">Select&#8230;</option>'
      +q.options.map(function(o){return '<option value="'+qa(o)+'"'+(ch===o?' selected':'')+'>'+esc(o)+'</option>';}).join('')
      +'</select></td></tr>';
  });
  return h+'</table>';
}
function rRetryOrderOpts(q){
  var items=S.retryOrderItems||q.items.slice(),h='<ul class="olist" id="OL">';
  items.forEach(function(item,i){
    h+='<li class="oitem" draggable="true" data-i="'+i+'"><div class="onum">'+(i+1)+'</div><div class="ogrip">&#10240; </div><div class="otxt2">'+esc(item)+'</div></li>';
  });
  return h+'</ul><p style="font-size:12px;color:var(--muted);margin-top:8px;text-align:center">Drag items into the correct order</p>';
}
function rLockedOpts(q,ua){
  var h='';
  Object.entries(q.options).forEach(function(kv){
    var L=kv[0],cls='opt';
    if(L===q.correct[0])cls+=' rev-ok';else if(L===ua)cls+=' rev-wrong';else cls+=' rev-skip';
    h+='<div class="'+cls+'" data-icon="'+L+'">'+esc(kv[1])+'</div>';
  });
  return h;
}
function rLockedMultiOpts(q,ua){
  var n=q.correct.length,h='<div class="mhint">Select <strong>'+n+'</strong> answer'+(n>1?'s':'')+'</div>';
  Object.entries(q.options).forEach(function(kv){
    var L=kv[0],cls='opt';
    if(q.correct.includes(L))cls+=' rev-ok';else if(ua.includes(L))cls+=' rev-wrong';else cls+=' rev-skip';
    h+='<div class="'+cls+'" data-icon="'+L+'">'+esc(kv[1])+'</div>';
  });
  return h;
}

// Standard option renderers (study mode)
function rSingle(q,locked,prevAns){
  var raw=prevAns||S.sel;var ua=Array.isArray(raw)?raw[0]:(raw||null);var h='';
  Object.entries(q.options).forEach(function(kv){
    var L=kv[0],cls='opt';
    if(locked){if(L===q.correct[0])cls+=' rev-ok';else if(L===ua)cls+=' rev-wrong';else cls+=' rev-skip';}
    else if(L===ua)cls+=' sel';
    h+='<div class="'+cls+'" data-icon="'+L+'"'+(locked?'':' onclick="S.sel=[\''+qa(L)+'\']; render()"')+'>'+esc(kv[1])+'</div>';
  });
  return h;
}
function rMulti(q,locked,prevAns){
  var ua=prevAns||(Array.isArray(S.sel)?S.sel:[]);var n=q.correct.length;
  var h='<div class="mhint">Select <strong>'+n+'</strong> answer'+(n>1?'s':'')+'</div>';
  Object.entries(q.options).forEach(function(kv){
    var L=kv[0],cls='opt',icon=L;
    if(locked){if(q.correct.includes(L)){cls+=' rev-ok';}else if(ua.includes(L)){cls+=' rev-wrong';}else{cls+=' rev-skip';}}
    else if(ua.includes(L)){cls+=' sel';icon='&#10003;';}
    h+='<div class="'+cls+'" data-icon="'+icon+'"'+(locked?'':' onclick="var a=Array.isArray(S.sel)?S.sel.slice():[]; var i=a.indexOf(\''+qa(L)+'\'); if(i>=0)a.splice(i,1); else a.push(\''+qa(L)+'\'); S.sel=a; render()"')+'>'+esc(kv[1])+'</div>';
  });
  return h;
}
function rMatch(q,locked,prevAns){
  var us=prevAns||S.matchSel,h='<table class="mtbl">';
  q.pairs.forEach(function(p,i){
    var ch=us[i]||'',ok=ch===p.correct;
    h+='<tr><td class="mdesc">'+esc(p.description)+'</td>'
      +(locked?'<td class="mico">'+(ok?'&#9989;':'&#10060;')+'</td>':'<td class="mico"></td>')
      +'<td class="msel"><select class="'+(locked?(ok?'ok':'err'):'')+'"'+(locked?' disabled':'')+' onchange="S.matchSel['+i+']=this.value;render()">'
      +'<option value="">Select&#8230;</option>'
      +q.options.map(function(o){return '<option value="'+qa(o)+'"'+(ch===o?' selected':'')+'>'+esc(o)+'</option>';}).join('')
      +'</select></td></tr>';
    if(locked&&!ok)h+='<tr><td colspan="3" style="padding:0 0 6px 2px;font-size:12px;color:var(--ok-txt)">&#10003; Correct: <strong>'+esc(p.correct)+'</strong></td></tr>';
  });
  return h+'</table>';
}
function rOrder(q,locked,prevAns){
  var items=prevAns||S.orderItems||q.items.slice(),h='<ul class="olist" id="OL">';
  items.forEach(function(item,i){
    var ok=item===q.correct[i],cls='oitem'+(locked?(ok?' rev-ok':' rev-err locked'):'');
    h+='<li class="'+cls+'" draggable="'+(locked?'false':'true')+'" data-i="'+i+'"><div class="onum">'+(i+1)+'</div><div class="ogrip">'+(locked?'':'&#10240; ')+'</div><div class="otxt2">'+esc(item)+'</div>'+(locked&&!ok?'<div style="font-size:11px;color:var(--ok-txt);margin-left:auto;white-space:nowrap">&#8594; '+esc(q.correct[i])+'</div>':'')+'</li>';
  });
  return h+'</ul>'+(locked?'':'<p style="font-size:12px;color:var(--muted);margin-top:8px;text-align:center">Drag items into the correct order</p>');
}

function attachDrag(q,isRetry){
  var list=document.getElementById('OL');if(!list)return;var dragIdx=null;
  list.querySelectorAll('li').forEach(function(li){
    li.addEventListener('dragstart',function(){dragIdx=+li.dataset.i;li.classList.add('dragging');});
    li.addEventListener('dragend',function(){li.classList.remove('dragging');});
    li.addEventListener('dragover',function(e){e.preventDefault();li.classList.add('drag-over');});
    li.addEventListener('dragleave',function(){li.classList.remove('drag-over');});
    li.addEventListener('drop',function(e){
      e.preventDefault();li.classList.remove('drag-over');var to=+li.dataset.i;if(dragIdx===null||dragIdx===to)return;
      var ref=isRetry?S.retryOrderItems:S.orderItems;
      var arr=ref.slice(),item=arr.splice(dragIdx,1)[0];arr.splice(to,0,item);
      if(isRetry)S.retryOrderItems=arr;else S.orderItems=arr;render();
    });
  });
}

function rExpl(q){
  var h='<div class="expl"><div class="xhdr">Explanation</div>';
  if(S.loading){h+='<div class="swrap"><div class="spin"></div> Generating&#8230;</div>';}
  else if(!S.expl||S.expl.error){h+='<div style="color:var(--muted);font-size:13px">Unavailable. <button class="btn" onclick="seeExpl()">Retry</button></div>';}
  else{
    if(S.expl.concept)h+='<div class="xcpt">&#128161; <strong>Key concept:</strong> '+esc(S.expl.concept)+'</div>';
    if((q.type==='single'||q.type==='multi')&&q.options){
      Object.entries(q.options).forEach(function(kv){var L=kv[0],e=S.expl[L];if(!e)return;var ok=e.ok||q.correct.includes(L);
        h+='<div class="xrow"><div class="xico">'+(ok?'&#9989;':'&#10060;')+'</div><div class="xtxt '+(ok?'bok':'berr')+'"><strong>'+L+'. '+esc(kv[1])+'</strong><br>'+esc(e.why||'')+'</div></div>';
      });
    }else if(q.type==='matching'&&S.expl.explanations){
      S.expl.explanations.forEach(function(e){h+='<div class="xrow"><div class="xico">&#9989;</div><div class="xtxt bok"><strong>'+esc(e.description)+'</strong> &#8594; '+esc(e.correct)+'<br><span style="color:var(--text)">'+esc(e.why||'')+'</span></div></div>';});
    }else if(q.type==='ordering'&&S.expl.steps){
      S.expl.steps.forEach(function(s,i){h+='<div class="xrow"><div class="xico" style="color:var(--acc);font-weight:700">'+(i+1)+'</div><div class="xtxt"><strong>'+esc(s.step||q.correct[i])+'</strong><br>'+esc(s.why||'')+'</div></div>';});
    }
  }
  return h+'</div>';
}

// ── Exam view ──────────────────────────────────────────────────────────────
function rExam(m){
  if(!S.exam){m.innerHTML='<div class="empty">No exam.</div>';return;}
  if(S.exam.submitted){rExamResults(m);return;}
  var q=S.exam.questions[S.exam.idx];
  var elapsed=Math.floor((Date.now()-S.exam.startTime)/1000);
  var rem=Math.max(0,EXAM_SECS-elapsed);
  var remM=Math.floor(rem/60),remS=rem%60;
  var timerCls='exam-timer'+(rem<300?' crit':rem<600?' warn':'');
  var answered=Object.keys(S.exam.answers).length;
  var isFlagged=S.exam.flagged[q.id];

  var h='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">'
       +'<span style="font-weight:700;color:var(--acc);font-size:13px;flex:1">Mock Exam</span>'
       +'<span class="'+timerCls+'" id="examTimerEl">'+remM+':'+(remS<10?'0':'')+remS+'</span>'
       +'<span style="font-size:12px;color:var(--muted)">'+answered+'/'+S.exam.questions.length+' answered</span>'
       +'<button class="flag-btn'+(isFlagged?' on':'')+'" onclick="S.exam.flagged['+q.id+']=!S.exam.flagged['+q.id+'];render()">&#128681; '+(isFlagged?'Flagged':'Flag')+'</button>'
       +'<button class="btn btn-pri" onclick="submitExam(false)">Submit</button>'
       +'<button class="btn" onclick="exitExam()">&#10005;</button>'

    +'<button class="btn'+(S.focusFilter==='unanswered'?' btn-pri':'')+'" onclick="S.focusFilter=\'unanswered\';render()">Unanswered</button>'

  var qs2=QS.map(function(qq,qi){
    var cor=0,wr=0,sk=0,hist=[];
    for(var tn=1;tn<=mt;tn++){var t=S.tries.find(function(x){return x.tryNum===tn;}),a=t?t.answers[qq.id]:null;if(a==null){sk++;hist.push('s');}else if(isOK(qq,a)){cor++;hist.push('o');}else{wr++;hist.push('e');}}
    return{qq:qq,qi:qi,cor:cor,wr:wr,sk:sk,hist:hist,mr:wr/(cor+wr||1)};
  });
  var fl=qs2;
  if(S.focusFilter==='wrong')fl=qs2.filter(function(x){return x.wr>0;});
  if(S.focusFilter==='unanswered')fl=qs2.filter(function(x){return x.sk===mt;});
  if(S.focusSort==='miss')fl=fl.slice().sort(function(a,b){return b.wr-a.wr||b.mr-a.mr||a.qq.id-b.qq.id;});
  else fl=fl.slice().sort(function(a,b){return a.qq.id-b.qq.id;});

  h+='<div style="overflow-x:auto"><table class="ftbl"><thead><tr><th>Q#</th><th>Type</th><th>Tries</th><th>Performance</th><th></th></tr></thead><tbody>';
  fl.forEach(function(x){

    var pct=x.cor+x.wr>0?Math.round(x.cor/(x.cor+x.wr)*100):null;
    h+='<tr><td><strong>Q'+x.qq.id+'</strong></td><td>'+badge(x.qq.type)+'</td><td>'+dots+'</td>'
      +'<td>'+(x.wr>0?'<span style="color:var(--err-txt);font-weight:700">'+x.wr+'&#10007;</span> <span style="color:var(--muted);font-size:11px">'+pct+'% right</span>':'<span style="color:var(--ok-txt)">'+(x.cor>0?'All correct':'Not tried')+'</span>')+'</td>'
      +'<td><button class="btn" onclick="startRetry(['+x.qi+'])">Retry &#8594;</button></td></tr>';
  });
  h+='</tbody></table></div>';m.innerHTML=h;
}

function exportJSON() {
  var exportData = {
    _readme: [
      "QuizForge Explanations File",
      "Fill each explanation:null field using an AI assistant.",
      "Format depends on question type — see _format below.",
      "Then upload this file back into the app (Account tab → Upload filled JSON).",
      "",
      "PROMPT TO GIVE YOUR AI:",
      "Fill every explanation that is null in this JSON array.",
      "Return ONLY the modified JSON array, nothing else, no markdown.",
      "Rules:",
      "- single or multi: {\"concept\":\"key AWS concept\",\"A\":{\"ok\":true,\"why\":\"1-2 sentences\"},\"B\":{\"ok\":false,\"why\":\"...\"},...}  — include ALL option keys, ok:true = correct answer",
      "- matching: {\"concept\":\"...\",\"explanations\":[{\"description\":\"row text\",\"correct\":\"correct option\",\"why\":\"reason\"}]}",
      "- ordering: {\"concept\":\"...\",\"steps\":[{\"step\":\"step text\",\"why\":\"why this position\"}]}",
      "Process in batches of 30-50 questions at a time if needed. Merge the arrays afterwards."
    ],
    _format: {
      single_or_multi: {"concept":"Key AWS concept","A":{"ok":true,"why":"Why A is right"},"B":{"ok":false,"why":"Why B is wrong"}},
      matching: {"concept":"Key concept","explanations":[{"description":"row text","correct":"correct option","why":"reason"}]},
      ordering: {"concept":"Key concept","steps":[{"step":"step text","why":"why this step is here"}]}
    },
    questions: QS.map(function(q) {
      var exp = S.explanations[q.id] || S.cache[q.id] || null;
      return Object.assign({}, q, {explanation: exp});
    })
  };

  try {
    var json = JSON.stringify(exportData, null, 2);
    var blob = new Blob([json], {type: 'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'aws-quiz-explanations.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(e) {
    alert('Export failed: ' + e.message);
  }
}

function triggerImport() {
  var inp = document.getElementById('importFileInput');
  if (inp) inp.click();
}

function handleImportFile(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var msgEl = document.getElementById('importMsg');
    try {
      var raw = JSON.parse(ev.target.result);
      var questions = Array.isArray(raw) ? raw : (raw.questions || []);
      if (!questions.length) throw new Error('No questions array found in file');

      var loaded = 0, skipped = 0, reasons = [];
      questions.forEach(function(q) {
        if (!q || !q.id) { skipped++; reasons.push('missing id'); return; }
        if (!q.explanation) { skipped++; return; } // null = not yet filled, skip silently
        if (typeof q.explanation !== 'object') { skipped++; reasons.push('Q'+q.id+': explanation not object'); return; }
        S.explanations[q.id] = q.explanation;
        S.cache[q.id] = q.explanation;
        loaded++;
      });

      var msg = loaded + ' explanations loaded.';
      if (skipped > 0) msg += ' ' + skipped + ' questions still have no explanation (fill them and re-upload).';
      if (msgEl) {
        msgEl.style.color = 'var(--ok-txt)';
        msgEl.textContent = '✓ Saving to cloud…';
      }
      // Save to Supabase so it persists for ALL devices
      saveContent().then(function(ok){
        if (msgEl) {
          msgEl.style.color = ok ? 'var(--ok-txt)' : 'var(--warn-txt)';
          msgEl.textContent = ok
            ? '✓ ' + msg + ' Saved to cloud — visible on all devices.'
            : '⚠️ Loaded locally but cloud save failed. Try again.';
        }
        setView('sync');
      });
    } catch(e) {
      if (msgEl) {
        msgEl.style.color = 'var(--err-txt)';
        msgEl.textContent = '✗ Import failed: ' + e.message;
      }
    }
    input.value = '';
  };
  reader.onerror = function() {
    var msgEl = document.getElementById('importMsg');
    if (msgEl) { msgEl.style.color = 'var(--err-txt)'; msgEl.textContent = '✗ Could not read file'; }
  };
  reader.readAsText(file);
}

function clearExplanations() {
  if (!confirm('Remove all offline explanations?')) return;
  S.explanations = {};
  setView('sync');
}

    + '<li>Repeat for all batches, then click <strong>Upload filled JSON</strong></li>'

  root.appendChild(howCard);

  // Category management section
  var h2cat = document.createElement('div');

function tabs(active){
  var t=[['quiz','&#128221; Study'],['stats','&#128202; Stats'],['focus','&#127919; Focus'],['examSetup','&#127891; Exam'],['sync','&#128279; Account']];
  var h='<div class="vtabs">';t.forEach(function(x){h+='<button class="vtab'+(active===x[0]?' act':'')+'" onclick="setView(\''+x[0]+'\')">'+x[1]+'</button>';});return h+'</div>';
}

// ── Boot ───────────────────────────────────────────────────────────────────


// ── ADMIN MODE ──────────────────────────────────────────────────────────────
var ADMIN_PWD = 'awsquiz2025'; // change this if you want

function toggleAdmin() {
  if (S.adminMode) {
    S.adminMode = false;
    render();
    return;
  }
  var pwd = prompt('Enter admin password:');
  if (pwd === ADMIN_PWD) {
    S.adminMode = true;
    alert('Admin mode ON. Edit buttons now appear on each question.');
    render();
  } else if (pwd !== null) {
    alert('Wrong password.');
  }
}

// Get corrected version of a question (admin edits override original data)
function getQ(q) {
  var c = S.corrections[q.id];
  if (!c) return q;
  var out = Object.assign({}, q);
  if (c.stem)    out.stem = c.stem;
  if (c.options) out.options = Object.assign({}, q.options, c.options);
  return out;
}

// ── Admin edit modal ─────────────────────────────────────────────────────────
function openEditModal(qid) {
  var orig = QS.find(function(q){ return q.id === qid; });
  if (!orig) return;
  var q    = getQ(orig);
  var corr = S.corrections[qid] || {};
  var exp  = S.explanations[qid] || {};

  // Remove any existing modal
  var existing = document.getElementById('adminModal');
  if (existing) existing.remove();

  var overlay = document.createElement('div');
  overlay.id = 'adminModal';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto';

  var modal = document.createElement('div');
  modal.style.cssText = 'background:var(--surf);border-radius:10px;padding:22px;max-width:640px;width:100%;border:1px solid var(--bdr2);margin-top:20px';

  // Header
  var hdr = document.createElement('div');
  hdr.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:16px';
  hdr.innerHTML = '<strong style="font-size:15px">✏️ Edit Q' + qid + ' — ' + q.type.toUpperCase() + '</strong>';
  var closeBtn = document.createElement('button');
  closeBtn.textContent = '✕ Close';
  closeBtn.className = 'btn';
  closeBtn.onclick = function(){ overlay.remove(); };
  hdr.appendChild(closeBtn);
  modal.appendChild(hdr);

  function field(label, id, value, big) {
    var wrap = document.createElement('div');
    wrap.style.marginBottom = '12px';
    var lbl = document.createElement('div');
    lbl.style.cssText = 'font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px';
    lbl.textContent = label;
    wrap.appendChild(lbl);
    var inp = document.createElement(big ? 'textarea' : 'input');
    inp.id = id;
    inp.value = value;
    inp.style.cssText = 'width:100%;border:1px solid var(--bdr2);border-radius:var(--rs);background:var(--surf2);color:var(--text);padding:8px 10px;font-size:13px;font-family:inherit;resize:vertical';
    if (big) { inp.rows = 3; }
    wrap.appendChild(inp);
    return wrap;
  }

  // Stem
  modal.appendChild(field('Question Text (stem)', 'ed_stem', q.stem, true));

  // Options
  if (q.options && typeof q.options === 'object') {
    var optHdr = document.createElement('div');
    optHdr.style.cssText = 'font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px';
    optHdr.textContent = 'Answer Options';
    modal.appendChild(optHdr);
    Object.keys(q.options).forEach(function(k) {
      var isCorrect = orig.correct && orig.correct.includes(k);
      modal.appendChild(field(k + (isCorrect ? ' ✓ CORRECT' : ''), 'ed_opt_' + k, q.options[k], false));
    });
  }

  // Explanation section
  var expHdr = document.createElement('div');
  expHdr.style.cssText = 'font-size:12px;font-weight:700;margin:14px 0 8px;padding-top:12px;border-top:1px solid var(--bdr)';
  expHdr.textContent = '💡 Explanation';
  modal.appendChild(expHdr);

  modal.appendChild(field('Concept (key idea)', 'ed_exp_concept', exp.concept || '', false));

  if (q.type === 'single' || q.type === 'multi') {
    Object.keys(q.options || {}).forEach(function(k) {
      var e = exp[k] || {};
      modal.appendChild(field(k + ' — explanation (why right or wrong)', 'ed_exp_' + k, e.why || '', true));
    });
  } else if (q.type === 'matching') {
    (exp.explanations || []).forEach(function(e, i) {
      modal.appendChild(field('Match ' + (i+1) + ' explanation', 'ed_exp_match_' + i, e.why || '', false));
    });
    if (!(exp.explanations||[]).length) {
      var note = document.createElement('p');
      note.style.cssText = 'font-size:12px;color:var(--muted)';
      note.textContent = 'Upload explanations via JSON first to enable inline editing for matching questions.';
      modal.appendChild(note);
    }
  } else if (q.type === 'ordering') {
    (exp.steps || []).forEach(function(s, i) {
      modal.appendChild(field('Step ' + (i+1) + ' explanation', 'ed_exp_step_' + i, s.why || '', false));
    });
  }

  // Save button
  var saveBtn = document.createElement('button');
  saveBtn.className = 'btn-acc';
  saveBtn.textContent = '💾 Save changes to cloud';
  saveBtn.style.marginTop = '16px';
  saveBtn.onclick = function() { saveEditModal(qid, orig, exp); };
  modal.appendChild(saveBtn);

  var statusDiv = document.createElement('div');
  statusDiv.id = 'editStatus';
  statusDiv.style.cssText = 'margin-top:10px;font-size:13px;min-height:18px';
  modal.appendChild(statusDiv);

  overlay.appendChild(modal);
  // Click outside to close
  overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
  document.body.appendChild(overlay);
}

async function saveEditModal(qid, orig, oldExp) {
  var statusEl = document.getElementById('editStatus');
  if (statusEl) { statusEl.textContent = 'Saving\u2026'; statusEl.style.color = 'var(--muted)'; }

  // Collect corrections (question text + options)
  var c = {};
  var stemEl = document.getElementById('ed_stem');
  if (stemEl && stemEl.value !== orig.stem) c.stem = stemEl.value;

  if (orig.options && typeof orig.options === 'object') {
    var optCorr = {};
    Object.keys(orig.options).forEach(function(k) {
      var el = document.getElementById('ed_opt_' + k);
      if (el && el.value !== orig.options[k]) optCorr[k] = el.value;
    });
    if (Object.keys(optCorr).length) c.options = optCorr;
  }

  if (Object.keys(c).length) {
    S.corrections[qid] = Object.assign(S.corrections[qid] || {}, c);
  }

  // Collect explanation
  var conceptEl = document.getElementById('ed_exp_concept');
  var concept = conceptEl ? conceptEl.value.trim() : (oldExp.concept || '');

  var newExp = Object.assign({}, oldExp);
  newExp.concept = concept;

  if (orig.type === 'single' || orig.type === 'multi') {
    Object.keys(orig.options || {}).forEach(function(k) {
      var el = document.getElementById('ed_exp_' + k);
      if (el) {
        newExp[k] = newExp[k] || {};
        newExp[k].why = el.value;
        newExp[k].ok  = orig.correct && orig.correct.includes(k);
      }
    });
  } else if (orig.type === 'matching') {
    (oldExp.explanations || []).forEach(function(e, i) {
      var el = document.getElementById('ed_exp_match_' + i);
      if (el) { newExp.explanations[i] = Object.assign({}, e, {why: el.value}); }
    });
  } else if (orig.type === 'ordering') {
    (oldExp.steps || []).forEach(function(s, i) {
      var el = document.getElementById('ed_exp_step_' + i);
      if (el) { newExp.steps[i] = Object.assign({}, s, {why: el.value}); }
    });
  }

  if (concept || Object.keys(newExp).length > 1) {
    S.explanations[qid] = newExp;
    S.cache[qid] = newExp;
  }

  var ok = await saveContent();
  if (statusEl) {
    statusEl.style.color = ok ? 'var(--ok-txt)' : 'var(--err-txt)';
    statusEl.textContent = ok
      ? '\u2713 Saved! Changes are now live for all users and devices.'
      : '\u2717 Cloud save failed. Check connection and try again.';
  }
  // Update the live question text if we have corrections
  if (S.corrections[qid]) render();
}

  SB=supabase.createClient(SB_URL,SB_KEY);

    var sr=await SB.auth.getSession();
    if(sr.data&&sr.data.session&&sr.data.session.user){
      USERID=sr.data.session.user.id;USERNAME=localStorage.getItem('quiz_username')||sr.data.session.user.email.split('@')[0];
      document.getElementById('authOverlay').style.display='none';document.getElementById('hdrEl').style.display='';
      await startApp();return;
    }

  var saved=localStorage.getItem('quiz_username');if(saved)document.getElementById('authUser').value=saved;
})();
