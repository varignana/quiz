<script type="application/json" id="qdata">[{"id": 1, "stem": "A company makes forecasts each quarter to decide how to optimize operations to meet expected demand. The company uses ML models to make these forecasts. An AI practitioner is writing a report about the trained ML models to provide transparency and explainability to company stakeholders. What should the AI practitioner include in the report to meet the transparency and explainability requirements?", "options": {"A": "Code for model training", "B": "Partial dependence plots (PDPs)", "C": "Sample data for training", "D": "Model convergence tables"}, "correct": ["B"], "type": "single"}, {"id": 2, "stem": "A law firm wants to build an AI application by using large language models (LLMs). The application will read legal documents and extract key points from the documents. Which solution meets these requirements?", "options": {"A": "Build an automatic named entity recognition system.", "B": "Create a recommendation engine.", "C": "Develop a summarization chatbot.", "D": "Develop a multi-language translation system."}, "correct": ["C"], "type": "single"}, {"id": 3, "stem": "A company wants to classify human genes into 20 categories based on gene characteristics. The company needs an ML algorithm to document how the inner mechanism of the model affects the output. Which ML algorithm meets these requirements?", "options": {"A": "Decision trees", "B": "Linear regression", "C": "Logistic regression", "D": "Neural networks"}, "correct": ["A"], "type": "single"}, {"id": 4, "stem": "A company has built an image classification model to predict plant diseases from photos of plant leaves. The company wants to evaluate how many images the model classified correctly. Which evaluation metric should the company use to measure the model's performance?", "options": {"A": "R-squared score", "B": "Accuracy", "C": "Root mean squared error (RMSE)", "D": "Learning rate"}, "correct": ["B"], "type": "single"}, {"id": 5, "stem": "A company is using a pre-trained large language model (LLM) to build a chatbot for product recommendations. The company needs the LLM outputs to be short and written in a specific language. Which solution will align the LLM response quality with the company's expectations?", "options": {"A": "Adjust the prompt.", "B": "Choose an LLM of a different size.", "C": "Increase the temperature.", "D": "Increase the Top K value."}, "correct": ["A"], "type": "single"}, {"id": 6, "stem": "A company uses Amazon SageMaker for its ML pipeline in a production environment. The company has large input data sizes up to 1 GB and processing times up to 1 hour. The company needs near real-time latency. Which SageMaker inference option meets these requirements?", "options": {"A": "Real-time inference", "B": "Serverless inference", "C": "Asynchronous inference", "D": "Batch transform"}, "correct": ["C"], "type": "single"}, {"id": 7, "stem": "A company is using domain-specific models. The company wants to avoid creating new models from the beginning. The company instead wants to adapt pre-trained models to create models for new, related tasks. Which ML strategy meets these requirements?", "options": {"A": "Increase the number of epochs.", "B": "Use transfer learning.", "C": "Decrease the number of epochs.", "D": "Use unsupervised learning."}, "correct": ["B"], "type": "single"}, {"id": 8, "stem": "A company is building a solution to generate images for protective eyewear. The solution must have high accuracy and must minimize the risk of incorrect annotations. Which solution will meet these requirements?", "options": {"A": "Human-in-the-loop validation by using Amazon SageMaker Ground Truth Plus", "B": "Data augmentation by using an Amazon Bedrock knflowledge base", "C": "Image recognition by using Amazon Rekognition", "D": "Data summarization by using Amazon QuickSflight Q"}, "correct": ["A"], "type": "single"}, {"id": 9, "stem": "A company wants to create a chatbot by using a foundation model (FM) on Amazon Bedrock. The FM needs to access encrypted data that is stored in an Amazon S3 bucket. The data is encrypted with Amazon S3 managed keys (SSE-S3). The FM encounters a failure when attempting to access the S3 bucket data. Which solution will meet these requirements?", "options": {"A": "Ensure that the role that Amazon Bedrock assumes has permission to decrypt data with the correct encryption key.", "B": "Set the access permissions for the S3 buckets to allow public access to enable access over the internet.", "C": "Use prompt engineering techniques to tell the model to look for information in Amazon S3.", "D": "Ensure that the S3 data does not contain sensitive information."}, "correct": ["A"], "type": "single"}, {"id": 10, "stem": "A company wants to use language models to create an application for inference on edge devices. The inference must have the lowest latency possible. Which solution will meet these requirements?", "options": {"A": "Deploy optimized small language models (SLMs) on edge devices.", "B": "Deploy optimized large language models (LLMs) on edge devices.", "C": "Incorporate a centralized small language model (SLM) API for asynchronous communication with edge devices.", "D": "Incorporate a centralized large language model (LLM) API for asynchronous communication with edge devices."}, "correct": ["A"], "type": "single"}, {"id": 11, "stem": "A company wants to build an ML model by using Amazon SageMaker. The company needs to share and manage variables for model development across multiple teams. Which SageMaker feature meets these requirements?", "options": {"A": "Amazon SageMaker Feature Store", "B": "Amazon SageMaker Data Wrangler", "C": "Amazon SageMaker Clarify", "D": "Amazon SageMaker Model Cards"}, "correct": ["A"], "type": "single"}, {"id": 12, "stem": "A company wants to use generative AI to increase developer productivity and software development. The company wants to use Amazon Q Developer. What can Amazon Q Developer do to help the company meet these requirements?", "options": {"A": "Create software snippets, reference tracking, and open source license tracking.", "B": "Run an application without provisioning or managing servers.", "C": "Enable voice commands for coding and providing natural language search.", "D": "Convert audio files to text documents by using ML models."}, "correct": ["A"], "type": "single"}, {"id": 13, "stem": "A financial institution is using Amazon Bedrock to develop an AI application. The application is hosted in a VPC. To meet regulatory compliance standards, the VPC is not allowed access to any internet traffic. Which AWS service or feature will meet these requirements?", "options": {"A": "AWS PrivateLink", "B": "Amazon Macie", "C": "Amazon CloudFront", "D": "Internet gateway"}, "correct": ["A"], "type": "single"}, {"id": 14, "stem": "A company wants to develop an educational game where users answer questions such as the following: \"A jar contains six red, four green, and three yellow marbles. What is the probability of choosing a green marble from the jar?\" Which solution meets these requirements with the LEAST operational overhead?", "options": {"A": "Use supervised learning to create a regression model that will predict probability.", "B": "Use reinforcement learning to train a model to return the probability.", "C": "Use code that will calculate probability by using simple rules and computations.", "D": "Use unsupervised learning to create a model that will estimate probability density."}, "correct": ["C"], "type": "single"}, {"id": 15, "stem": "Which metric measures the runtime efficiency of operating AI models?", "options": {"A": "Customer satisfaction score (CSAT)", "B": "Training time for each epoch", "C": "Average response time", "D": "Number of training instances"}, "correct": ["C"], "type": "single"}, {"id": 16, "stem": "A company is building a contact center application and wants to gain insflflights from customer conversations. The company wants ts to use AI to protect its application from threats. The AI solution needs to check if an IP address is from a suspicious source. Which solution meets these requirements?", "options": {"A": "Build a speech recognition system.", "B": "Create a natural language processing (NLP) named entity recognition system.", "C": "Develop an anomaly detection system.", "D": "Create a fraud forecasting system."}, "correct": ["C"], "type": "single"}, {"id": 21, "stem": "Which feature of Amazon OpenSearch Service gives companies the ability to build vector database applications?", "options": {"A": "Integration with Amazon S3 for object storage", "B": "Support for geospatial indexing and queries", "C": "Scalable index management and nearest neighbor search capability", "D": "Ability to perform real-time analysis on streaming data"}, "correct": ["C"], "type": "single"}, {"id": 22, "stem": "Which option is a use case for generative AI models?", "options": {"A": "Improving network security by using intrusion detection systems", "B": "Creating photorealistic images from text descriptions for digital marketing", "C": "Enhancing database performance by using optimized indexing", "D": "Analyzing financial data to forecast stock market trends"}, "correct": ["B"], "type": "single"}, {"id": 23, "stem": "A company wants to build a generative AI application by using Amazon Bedrock and needs to choose a foundation model (FM). The company wants to knflow how much information can fit into one prompt. Which consideration will inform the company's decision?", "options": {"A": "Temperature", "B": "Context window", "C": "Batch size", "D": "Model size"}, "correct": ["B"], "type": "single"}, {"id": 24, "stem": "A company wants to make a chatbot to help customers. The chatbot will help solve technical problems without human intervention. The company chose a foundation model (FM) for the chatbot. The chatbot needs to produce responses that adhere to company tone. Which solution meets these requirements?", "options": {"A": "Set a low limit on the number of tokens the FM can produce.", "B": "Use batch inferencing to process detailed responses.", "C": "Experiment and refine the prompt until the FM produces the desired responses.", "D": "Define a higher number for the temperature parameter."}, "correct": ["C"], "type": "single"}, {"id": 25, "stem": "A company wants to use a large language model (LLM) on Amazon Bedrock for sentiment analysis. The company wants to classify the sentiment of text passages as positive or negative. Which prompt engineering strategy meets these requirements?", "options": {"A": "Provide examples of text passages with corresponding positive or negative labels in the prompt followed by the new text passage to be classified.", "B": "Provide a detailed explanation of sentiment analysis and how LLMs work in the prompt.", "C": "Provide the new text passage to be classified without any additional context or examples.", "D": "Provide the new text passage with a few examples of unrelated tasks, such as text summarization or question answering."}, "correct": ["A"], "type": "single"}, {"id": 26, "stem": "A security company is using Amazon Bedrock to run foundation models (FMs). The company wants to ensure that only authorized users invoke the models. The company needs to identify any unauthorized access attempts to set appropriate AWS Identity and Access Management (IAM) policies and roles for future iterations of the FMs. Which AWS service should the company use to identify unauthorized users that are trying to access Amazon Bedrock?", "options": {"A": "AWS Audit Manager", "B": "AWS CloudTrail", "C": "Amazon Fraud Detector", "D": "AWS Trusted Advisor"}, "correct": ["B"], "type": "single"}, {"id": 27, "stem": "A company has developed an ML model for image classification. The company wants to deploy the model to production so that a web application can use the model. The company needs to implement a solution to host the model and serve predictions without managing any of the underlying infrastructure. Which solution will meet these requirements?", "options": {"A": "Use Amazon SageMaker Serverless Inference to deploy the model.", "B": "Use Amazon CloudFront to deploy the model.", "C": "Use Amazon API Gateway to host the model and serve predictions.", "D": "Use AWS Batch to host the model and serve predictions."}, "correct": ["A"], "type": "single"}, {"id": 28, "stem": "An AI company periodically evaluates its systems and processes with the help of independent software vendors (ISVs). The company needs to receive email message notifications when an ISV's compliance reports become available. Which AWS service can the company use to meet this requirement?", "options": {"A": "AWS Audit Manager", "B": "AWS Artifact", "C": "AWS Trusted Advisor", "D": "AWS Data Exchange"}, "correct": ["B"], "type": "single"}, {"id": 29, "stem": "A company wants to use a large language model (LLM) to develop a conversational agent. The company needs to prevent the LLM from being manipulated with common prompt engineering techniques to perform undesirable actions or expose sensitive information. Which action will reduce these risks?", "options": {"A": "Create a prompt template that teaches the LLM to detect attack patterns.", "B": "Increase the temperature parameter on invocation requests to the LLM.", "C": "Avoid using LLMs that are not listed in Amazon SageMaker.", "D": "Decrease the number of input tokens on invocations of the LLM."}, "correct": ["A"], "type": "single"}, {"id": 30, "stem": "A company is using the Generative AI Security Scoping Matrix to assess security responsibilities for its solutions. The company has identified four different solution scopes based on the matrix. Which solution scope gives the company the MOST flownership of security responsibilities?", "options": {"A": "Using a third-party enterprise application that has embedded generative AI features.", "B": "Building an application by using an existing third-party generative AI foundation model (FM).", "C": "Refining an existing third-party generative AI foundation model (FM) by fine-tuning the model by using data specific to the business.", "D": "Building and training a generative AI model from scratch by using specific data that a customer flowns."}, "correct": ["D"], "type": "single"}, {"id": 31, "stem": "An AI practitioner has a database of animal photos. The AI practitioner wants to automatically identify and categorize the animals in the photos without manual human effort. Which strategy meets these requirements?", "options": {"A": "Object detection", "B": "Anomaly detection", "C": "Named entity recognition", "D": "Inpainting"}, "correct": ["A"], "type": "single"}, {"id": 32, "stem": "A company wants to create an application by using Amazon Bedrock. The company has a limited budget and prefers flexibility without long-term commitment. Which Amazon Bedrock pricing model meets these requirements?", "options": {"A": "On-Demand", "B": "Model customization", "C": "Provisioned Throughput", "D": "Spot Instance"}, "correct": ["A"], "type": "single"}, {"id": 33, "stem": "Which AWS service or feature can help an AI development team quickly deploy and consume a foundation model (FM) within the team's VPC?", "options": {"A": "Amazon Personalize", "B": "Amazon SageMaker JumpStart", "C": "PartyRock, an Amazon Bedrock Playground", "D": "Amazon SageMaker endpoints"}, "correct": ["B"], "type": "single"}, {"id": 34, "stem": "Hflow can companies use large language models (LLMs) securely on Amazon Bedrock?", "options": {"A": "Design clear and specific prompts. Configure AWS Identity and Access Management (IAM) roles and policies by using least privilege access.", "B": "Enable AWS Audit Manager for automatic model evaluation jobs.", "C": "Enable Amazon Bedrock automatic model evaluation jobs.", "D": "Use Amazon CloudWatch Logs to make models explainable and to monitor for bias."}, "correct": ["A"], "type": "single"}, {"id": 35, "stem": "A company has terabytes of data in a database that the company can use for business analysis. The company wants to build an AI-based application that can build a SQL query from input text that employees provide. The employees have minimal experience with technology. Which solution meets these requirements?", "options": {"A": "Generative pre-trained transformers (GPT)", "B": "Residual neural network", "C": "Support vector machine", "D": "WaveNet"}, "correct": ["A"], "type": "single"}, {"id": 36, "stem": "A company built a deep learning model for object detection and deployed the model to production. Which AI process occurs when the model analyzes a new image to identify objects?", "options": {"A": "Training", "B": "Inference", "C": "Model deployment", "D": "Bias correction"}, "correct": ["B"], "type": "single"}, {"id": 37, "stem": "An AI practitioner is building a model to generate images of humans in various professions. The AI practitioner discovered that the input data is biased and that specific attributes affect the image generation and create bias in the model. Which technique will solve the problem?", "options": {"A": "Data augmentation for imbalanced classes", "B": "Model monitoring for class distribution", "C": "Retrieval Augmented Generation (RAG)", "D": "Watermark detection for images"}, "correct": ["A"], "type": "single"}, {"id": 38, "stem": "A company is implementing the Amazon Titan foundation model (FM) by using Amazon Bedrock. The company needs to supplement the model by using relevant data from the company's private data sources. Which solution will meet this requirement?", "options": {"A": "Use a different FM.", "B": "Choose a lower temperature value.", "C": "Create an Amazon Bedrock knflowledge base.", "D": "Enable model invocation logging."}, "correct": ["C"], "type": "single"}, {"id": 39, "stem": "A medical company is customizing a foundation model (FM) for diagnostic purposes. The company needs the model to be transparent and explainable to meet regula rs the quality of ML models in production", "C": "Documents critical details about ML models", "D": "Identifies potential bias during data preparation"}, "correct": ["D"], "type": "single"}, {"id": 44, "stem": "A company is developing a new model to predict the prices of specific items. The model performed well on the training dataset. When the company deployed the model to production, the model's performance decreased significantly. What should the company do to mitigate this problem?", "options": {"A": "Reduce the volume of data that is used in training.", "B": "Add hyperparameters to the model.", "C": "Increase the volume of data that is used in training.", "D": "Increase the model training time."}, "correct": ["C"], "type": "single"}, {"id": 45, "stem": "An ecommerce company wants to build a solution to determine customer sentiments based on written customer reviews of products. Which AWS services meet these requirements? (Choose two.)", "options": {"A": "Amazon Lex", "B": "Amazon Comprehend", "C": "Amazon Polly", "D": "Amazon Bedrock", "E": "Amazon Rekognition"}, "correct": ["B", "D"], "type": "multi"}, {"id": 46, "stem": "A company wants to use large language models (LLMs) with Amazon Bedrock to develop a chat interface for the company's product manuals. The manuals are stored as PDF files. Which solution meets these requirements MOST cost-effectively?", "options": {"A": "Use prompt engineering to add one PDF file as context to the user prompt when the prompt is submitted to Amazon Bedrock.", "B": "Use prompt engineering to add all the PDF files as context to the user prompt when the prompt is submitted to Amazon Bedrock.", "C": "Use all the PDF documents to fine-tune a model with Amazon Bedrock. Use the fine-tuned model to process user prompts.", "D": "Upload PDF documents to an Amazon Bedrock knflowledge base. Use the knflowledge base to provide context when users submit prompts to Amazon Bedrock."}, "correct": ["D"], "type": "single"}, {"id": 47, "stem": "A social media company wants to use a large language model (LLM) for content moderation. The company wants to evaluate the LLM outputs for bias and potential discrimination against specific groups or individuals. Which data source should the company use to evaluate the LLM outputs with the LEAST administrative effort?", "options": {"A": "User-generated content", "B": "Moderation logs", "C": "Content moderation guidelines", "D": "Benchmark datasets"}, "correct": ["D"], "type": "single"}, {"id": 48, "stem": "A company wants to use a pre-trained generative AI model to generate content for its marketing campaigns. The company needs to ensure that the generated content aligns with the company's brand voice and messaging requirements. Which solution meets these requirements?", "options": {"A": "Optimize the model's architecture and hyperparameters to improve the model's overall performance.", "B": "Increase the model's complexity by adding more layers to the model's architecture.", "C": "Create effective prompts that provide clear instructions and context to guide the model's generation.", "D": "Select a large, diverse dataset to pre-train a new generative model."}, "correct": ["C"], "type": "single"}, {"id": 49, "stem": "A loan company is building a generative AI-based solution to offer new applicants discounts based on specific business criteria. The company wants to build and use an AI model responsibly to minimize bias that could negatively affect some customers. Which actions should the company take to meet these requirements? (Choose two.)", "options": {"A": "Detect imbalances or disparities in the data.", "B": "Ensure that the model runs frequently.", "C": "Evaluate the model's behavior so that the company can provide transparency to stakeholders.", "D": "Use the Recall-Oriented Understudy for Gisting Evaluation (ROUGE) technique to ensure that the model is 100% accurate.", "E": "Ensure that the model's inference time is within the accepted limits."}, "correct": ["A", "C"], "type": "multi"}, {"id": 50, "stem": "A company is using an Amazon Bedrock base model to summarize documents for an internal use case. The company trained a custom model to improve the summarization quality. Which action must the company take to use the custom model through Amazon Bedrock?", "options": {"A": "Purchase Provisioned Throughput for the custom model.", "B": "Deploy the custom model in an Amazon SageMaker endpoint for real-time inference.", "C": "Register the model with the Amazon SageMaker Model Registry.", "D": "Grant access to the custom model in Amazon Bedrock."}, "correct": ["A"], "type": "single"}, {"id": 51, "stem": "A company needs to choose a model from Amazon Bedrock to use internally. The company must identify a model that generates responses in a style that the company's employees prefer. What should the company do to meet these requirements?", "options": {"A": "Evaluate the models by using built-in prompt datasets.", "B": "Evaluate the models by using a human workforce and custom prompt datasets.", "C": "Use public model leaderboards to identify the model.", "D": "Use the model InvocationLatency runtime metrics in Amazon CloudWatch when trying models."}, "correct": ["B"], "type": "single"}, {"id": 52, "stem": "A student at a university is copying content from generative AI to write essays. Which challenge of responsible generative AI does this scenario represent?", "options": {"A": "Toxicity", "B": "Hallucinations", "C": "Plagiarism", "D": "Privacy"}, "correct": ["C"], "type": "single"}, {"id": 53, "stem": "A company needs to build its flown large language model (LLM) based on only the company's private data. The company is concerned about the environmental effect of the training process. Which Amazon EC2 instance type has the LEAST environmental effect when training LLMs?", "options": {"A": "Amazon EC2 C series", "B": "Amazon EC2 G series", "C": "Amazon EC2 P series", "D": "Amazon EC2 Trn series"}, "correct": ["D"], "type": "single"}, {"id": 54, "stem": "A company wants to build an interactive application for children that generates new stories based on classic stories. The company wants to use Amazon Bedrock and needs to ensure that the results and topics are appropriate for children. Which AWS service or feature will meet these requirements?", "options": {"A": "Amazon Rekognition", "B": "Amazon Bedrock playgrounds", "C": "Guardrails for Amazon Bedrock", "D": "Agents for Amazon Bedrock"}, "correct": ["C"], "type": "single"}, {"id": 55, "stem": "A company is building an application that needs to generate synthetic data that is based on existing data. Which type of model can the company use to meet this requirement?", "options": {"A": "Generative adversarial network (GAN)", "B": "XGBoost", "C": "Residual neural network", "D": "WaveNet"}, "correct": ["A"], "type": "single"}, {"id": 56, "stem": "A digital devices company wants to predict customer demand for memory hardware. The company does not have coding experience or knflowledge of ML algorithms and needs to develop a data-driven predictive model. The company needs to perform analysis on internal data and external data. Which solution will meet these requirements?", "options": {"A": "Store the data in Amazon S3. Create ML models and demand forecast predictions by using Amazon SageMaker built-in algorithms that use the data from Amazon S3.", "B": "Import the data into Amazon SageMaker Data Wrangler. Create ML models and demand forecast predictions by using SageMaker built-in algorithms.", "C": "Import the data into Amazon SageMaker Data Wrangler. Build ML models and demand forecast predictions by using an Amazon Personalize Trending-Nflow recipe.", "D": "Import the data into Amazon SageMaker Canvas. Build ML models and demand forecast predictions by selecting the values in the data from SageMaker Canvas."}, "correct": ["D"], "type": "single"}, {"id": 57, "stem": "A company has installed a security camera. The company uses an ML model to evaluat ct customer satisfaction. The company needs fully automated model tuning. Which AWS service meets these requirements?", "options": {"A": "Amazon Personalize", "B": "Amazon SageMaker", "C": "Amazon Athena", "D": "Amazon Comprehend"}, "correct": ["B"], "type": "single"}, {"id": 123, "stem": "Which technique can a company use to lower bias and toxicity in generative AI applications during the post-processing ML lifecycle?", "options": {"A": "Human-in-the-loop", "B": "Data augmentation", "C": "Feature engineering", "D": "Adversarial training"}, "correct": ["A"], "type": "single"}, {"id": 124, "stem": "A bank has fine-tuned a large language model (LLM) to expedite the loan approval process. During an external audit of the model, the company discovered that the model was approving loans at a faster pace for a specific demographic than for other demographics. Hflow should the bank fix this issue MOST cost-effectively?", "options": {"A": "Include more diverse training data. Fine-tune the model again by using the new data.", "B": "Use Retrieval Augmented Generation (RAG) with the fine-tuned model.", "C": "Use AWS Trusted Advisor checks to eliminate bias.", "D": "Pre-train a new LLM with more diverse training data."}, "correct": ["A"], "type": "single"}, {"id": 125, "type": "matching", "stem": "A company has developed a large language model (LLM) and wants to make the LLM available to multiple internal teams. The company needs to select the appropriate inference mode for each team. Select the correct inference mode for each use case.", "options": ["Batch transform", "Real-time inference"], "pairs": [{"description": "The company's chatbot needs predictions from the LLM to understand users' intent with minimal latency.", "correct": "Real-time inference"}, {"description": "A data processing job needs to query the LLM to process gigabytes of text files on weekends.", "correct": "Batch transform"}, {"description": "The company's engineering team needs to create an API that can process small pieces of text content and provide low-latency predictions.", "correct": "Real-time inference"}]}, {"id": 126, "stem": "A company needs to log all requests made to its Amazon Bedrock API. The company must retain the logs securely for 5 years at the lowest possible cost. Which combination of AWS service and storage class meets these requirements? (Choose two.)", "options": {"A": "AWS CloudTrail", "B": "Amazon CloudWatch", "C": "AWS Audit Manager", "D": "Amazon S3 Intelligent-Tiering", "E": "Amazon S3 Standard"}, "correct": ["A", "D"], "type": "multi"}, {"id": 127, "stem": "An ecommerce company wants to improve search engine recommendations by customizing the results for each user of the company’s ecommerce platform. Which AWS service meets these requirements?", "options": {"A": "Amazon Personalize", "B": "Amazon Kendra", "C": "Amazon Rekognition", "D": "Amazon Transcribe"}, "correct": ["A"], "type": "single"}, {"id": 128, "stem": "A hospital is developing an AI system to assist doctors in dflagnosing diseases based on patient records and medical images. To comply with regulations, the sensitive patient data must not leave the country the data is located in. Which data governance strategy will ensure compliance and protect patient privacy?", "options": {"A": "Data residency", "B": "Data quality", "C": "Data discoverability", "D": "Data enrichment"}, "correct": ["A"], "type": "single"}, {"id": 129, "stem": "A company needs to monitor the performance of its ML systems by using a highly scalable AWS service. Which AWS service meets these requirements?", "options": {"A": "Amazon CloudWatch", "B": "AWS CloudTrail", "C": "AWS Trusted Advisor", "D": "AWS Config"}, "correct": ["A"], "type": "single"}, {"id": 130, "stem": "An AI practitioner is developing a prompt for an Amazon Titan model. The model is hosted on Amazon Bedrock. The AI practitioner is using the model to solve numerical reasoning challenges. The AI practitioner adds the following phrase to the end of sitive information in the documents that are uploaded to Amazon S3.", "B": "Use Amazon SageMaker endpoints to deploy a large language model (LLM) to redact sensitive data.", "C": "Develop multiple regex patterns to detect sensitive data. Expose the regex patterns on an Amazon SageMaker notebook.", "D": "Ask the customers to avoid sharing sensitive information in their email messages."}, "correct": ["A"], "type": "single"}, {"id": 143, "type": "matching", "stem": "A company is training its employees on how to structure prompts for foundation models. Select the correct prompt engineering technique from the following list for each prompt template. Each prompt engineering technique should be selected one time.", "options": ["Chain-of-thought reasoning", "Few-shot learning", "Zero-shot learning"], "pairs": [{"description": "\"Classify the following text as either sports, politics, or entertainment: [input text].\"", "correct": "Zero-shot learning"}, {"description": "\"A [image 1], [image 2], and [image 3] are examples of [target class]. Classify the following image as [target class].\"", "correct": "Few-shot learning"}, {"description": "\"[Question.] [Instructions to follow.] Think step by step and walk me through your thinking.\"", "correct": "Chain-of-thought reasoning"}]}, {"id": 144, "type": "matching", "stem": "A company is using a generative AI model to develop a digital assistant. The model's responses occasionally include undesirable and potentially harmful content. Select the correct Amazon Bedrock filter policy from the following list for each mitigation action. Each filter policy should be selected one time.", "options": ["Content filters", "Contextual grounding check", "Denied topics", "Word filters"], "pairs": [{"description": "Block input prompts or model responses that contain harmful content such as hate, insults, violence, or misconduct.", "correct": "Content filters"}, {"description": "Avoid subjects related to illegal investment advice or legal advice. ble AI does this scenario present?", "options": {"A": "Fairness", "B": "Explainability", "C": "Privacy and security", "D": "Transparency"}, "correct": ["A"], "type": "single"}, {"id": 149, "stem": "A global financial company has developed an ML application to analyze stock market data and provide stock market trends. The company wants to continuously monitor the application development phases and to ensure that company policies and industry regulations are followed. Which AWS services will help the company assess compliance requirements? (Choose two.)", "options": {"A": "AWS Audit Manager", "B": "AWS Config", "C": "Amazon Inspector", "D": "Amazon CloudWatch", "E": "AWS CloudTrail"}, "correct": ["A", "E"], "type": "multi"}, {"id": 150, "stem": "A company wants to improve the accuracy of the responses from a generative AI application. The application uses a foundation model (FM) on Amazon Bedrock. Which solution meets these requirements MOST cost-effectively?", "options": {"A": "Fine-tune the FM.", "B": "Retrain the FM.", "C": "Train a new FM.", "D": "Use prompt engineering."}, "correct": ["D"], "type": "single"}, {"id": 151, "stem": "A company wants to identify harmful language in the comments section of social media posts by using an ML model. The company will not use labeled data to train the model. Which strategy should the company use to identify harmful language?", "options": {"A": "Use Amazon Rekognition moderation.", "B": "Use Amazon Comprehend toxicity detection.", "C": "Use Amazon SageMaker built-in algorithms to train the model.", "D": "Use Amazon Polly to monitor comments."}, "correct": ["B"], "type": "single"}, {"id": 152, "stem": "A media company wants to analyze viewer behavior and demographics to recommend personalized content. The company wants to deploy a customized ML model in its production environment. The company also wants to observe if the model quality drifts over time. Which AWS service or feature meets these requirements?", "options": {"A": "], "type": "single"}, {"id": 165, "stem": "A company uses Amazon Bedrock for its generative AI application. The company wants to use Amazon Bedrock Guardrails to detect and filter harmful user inputs and model-generated outputs. Which content categories can the guardrails filter? (Choose two.)", "options": {"A": "Hate", "B": "Politics", "C": "Violence", "D": "Gambling", "E": "Religion"}, "correct": ["A", "C"], "type": "multi"}, {"id": 166, "stem": "Which scenario describes a potential risk and limitation of prompt engineering in the context of a generative AI model?", "options": {"A": "Prompt engineering does not ensure that the model always produces consistent and deterministic outputs, eliminating the need for validation.", "B": "Prompt engineering could expose the model to vulnerabilities such as prompt injection attacks.", "C": "Properly designed prompts reduce but do not eliminate the risk of data poisoning or model hijacking.", "D": "Prompt engineering does not ensure that the model will consistently generate highly reliable outputs when working with real-world data."}, "correct": ["B"], "type": "single"}, {"id": 167, "stem": "A publishing company built a Retrieval Augmented Generation (RAG) based solution to give its users the ability to interact with published content. New content is published daily. The company wants to provide a near real-time experience to users. Which steps in the RAG pipeline should the company implement by using orine batch processing to meet these requirements? (Choose two.)", "options": {"A": "Generation of content embeddings", "B": "Generation of embeddings for user queries", "C": "Creation of the search index", "D": "Retrieval of relevant content", "E": "Response generation for the user"}, "correct": ["A", "C"], "type": "multi"}, {"id": 168, "stem": "Which technique breaks a complex task into smaller subtasks that are sent sequentially to a large language model (LLM)?", "options": {"A": "One-shot prompting", "B": "Prompt chaining"  should be selected one time.", "options": ["Concurrency", "Context windflows", "Latency"], "pairs": [{"description": "Amount of information that can fit in a single prompt.", "correct": "Context windflows"}, {"description": "Length of time it takes for a model to generate an output.", "correct": "Latency"}, {"description": "Multiple users invoking an application endpoint simultaneously.", "correct": "Concurrency"}]}, {"id": 301, "stem": "A company is using large language models (LLMs) to develop online tutoring applications. The company needs to apply configurable safeguards to the LLMs. These safeguards must ensure that the LLMs follow standard safety rules when creating applications. Which solution will meet these requirements with the LEAST effort?", "options": {"A": "Amazon Bedrock playgrounds", "B": "Amazon SageMaker Clarify", "C": "Amazon Bedrock Guardrails", "D": "Amazon SageMaker Jumpstart"}, "correct": ["C"], "type": "single"}, {"id": 302, "stem": "A company is exploring Amazon Nova models in Amazon Bedrock. The company needs a multimodal model that supports multiple languages. Which Nova model will meet these requirements MOST cost-effectively?", "options": {"A": "Nova Lite", "B": "Nova Pro", "C": "Nova Canvas", "D": "Nova Reel"}, "correct": ["A"], "type": "single"}, {"id": 303, "stem": "A company is building a new generative AI chatbot. The chatbot uses an Amazon Bedrock foundation model (FM) to generate responses. During testing, the company notices that the chatbot is prone to prompt injection attacks. What can the company do to secure the chatbot with the LEAST implementation effort?", "options": {"A": "Fine-tune the FM to avoid harmful responses.", "B": "Use Amazon Bedrock Guardrails content filters and denied topics.", "C": "Change the FM to a more secure FM.", "D": "Use chain-of-thought prompting to produce secure responses."}, "correct": ["B"], "type": "single"}, {"id": 304, "stem": "What does inference refer to in the context of AI?", "options": {"A": "The process of creating new AI algorithms", "B": "The use of a trained model to make predictions or decisions on unseen data", "C": "The process of combining multiple AI models into one model", "D": "The method of collecting training data for AI systems"}, "correct": ["B"], "type": "single"}, {"id": 305, "stem": "A company wants to build an AI assistant to provide responses to user queries. The AI assistant must evaluate specific data sources, query external APIs, generate response options, and compare and prioritize response options. Which Amazon Bedrock feature or resource will meet these requirements?", "options": {"A": "Prompt Management", "B": "Response streaming", "C": "Knflowledge Bases", "D": "Agents"}, "correct": ["D"], "type": "single"}, {"id": 306, "stem": "An AI practitioner notices a large language model (LLM) is generating different responses for the same input across multiple invocations. Which risk of AI does this describe?", "options": {"A": "Hallucinations", "B": "Nondeterminism", "C": "Accuracy", "D": "Multimodality"}, "correct": ["B"], "type": "single"}, {"id": 307, "stem": "A company is building a generative AI application on AWS. The application will help improve reading comprehension for students. The application must give students the ability to add illustrations to stories. Which solution will meet this requirement?", "options": {"A": "Use Amazon Bedrock Stable Diffusion 3.5 Large to generate images based on text inputs.", "B": "Use Amazon Polly to create an audiobook based on story texts.", "C": "Use Amazon Rekognition to analyze image contents and detect text attributes.", "D": "Create a standard prompt template. Use Amazon Q Business to illustrate stories."}, "correct": ["A"], "type": "single"}, {"id": 308, "stem": "A healthcare company wants to analyze patient data. The data was gathered over the previous year to detect patterns in disease outbreaks. The company needs to create a trend analysis report for each month to present to public health oecials. The company must provide insflflights into patient data from the most recent month of the current year. Which inference method will meet these requirements MOST cost-effectively?", "options": {"A": "Real-time inference", "B": "Batch transform", "C": "Serverless inference", "D": "Asynchronous inference"}, "correct": ["B"], "type": "single"}, {"id": 309, "type": "ordering", "stem": "Select and order the steps from the following list to correctly describe the ML lifecycle for a new custom model. Select each step one time.", "items": ["Define the business objective.", "Process the data.", "Develop and train the model.", "Deploy the model."], "correct": ["Define the business objective.", "Process the data.", "Develop and train the model.", "Deploy the model."]}, {"id": 310, "stem": "A company acquires International Organization for Standardization (ISO) accreditation to manage AI risks and to use AI responsibly. What does this accreditation reflect about the company?", "options": {"A": "All members of the company are ISO certified.", "B": "All AI systems that the company uses are ISO certified.", "C": "All AI application team members are ISO certified.", "D": "The company's development framework is ISO certified."}, "correct": ["D"], "type": "single"}, {"id": 311, "type": "matching", "stem": "Select the correct prompt engineering technique from the following list for each description. Select each prompt engineering technique one time or not at all.", "options": ["Chain-of-thought prompting", "Few-shot prompting", "Role-based prompting", "Single-shot prompting", "Zero-shot prompting"], "pairs": [{"description": "Provide a small number of examples to the model to understand the desired task before generating outputs.", "correct": "Few-shot prompting"}, {"description": "Prompt a model to break dflown the step-by-step process that the model took to arrive at a final answer.", "correct": "Chain-of-thought prompting"}, {"description": "Prompt a model to perform a task without providing examples.", "correct": "Zero-shot prompting"}]}, {"id": 312, "stem": "A company is developing an ML model to predict heart disease risk. The model uses patient data, such as age, cholesterol, blood pressure, smoking status, and exercise habits. The dataset includes a target value that indicates whether a patient has heart disease. Which ML technique will meet these requirements?", "options": {"A": "Unsupervised learning", "B": "Supervised learning", "C": "Reinforcement learning", "D": "Semi-supervised learning"}, "correct": ["B"], "type": "single"}, {"id": 313, "type": "ordering", "stem": "A company periodically updates its product database by manually uploading digital product guides. The product guides contain text and images. The company wants to automate this task by using generative AI. Select and order the steps from the following list to automate the database update task by using generative AI. Select each step one time.", "items": ["Upload the digital text and image files to an Amazon S3 bucket.", "Use Amazon Nova multimodal models to process the digital text and image files.", "Insert data into the product database."], "correct": ["Upload the digital text and image files to an Amazon S3 bucket.", "Use Amazon Nova multimodal models to process the digital text and image files.", "Insert data into the product database."]}, {"id": 314, "stem": "A company has guidelines for data storage and deletion. Which data governance strategy does this describe?", "options": {"A": "Data de-identification", "B": "Data quality standards", "C": "Data retention", "D": "Log storage"}, "correct": ["C"], "type": "single"}, {"id": 315, "stem": "A company needs to apply numerical transformations to a set of images to transpose and rotate the images. Which solution will meet these requirements in the MOST operationally efficient way?", "options": {"A": "Create a deep neural network by using the images as input.", "B": "Create an AWS Lambda function to perform the transformations.", "C": "Use an Amazon Bedrock large language model (LLM) with a high temperature.", "D": "Use AWS Glue Data Quality to make corrections to each image."}, "correct": ["B"], "type": "single"}, {"id": 316, "stem": "An AI practitioner is writing software code. The AI practitioner wants to quickly develop a test case and create documentation for the code. Which solution will meet these requirements with the LEAST effort?", "options": {"A": "Upload the code to an online coding assistant.", "B": "Develop an application to use foundation models (FMs).", "C": "Use Amazon Q Developer in an integrated development environment (IDE).", "D": "Research and write test cases. Then, create test cases and add documentation."}, "correct": ["C"], "type": "single"}, {"id": 317, "stem": "A company is developing a generative AI application to automatically generate product descriptions for an ecommerce website. The product descriptions must consist of paragraphs of text that are consistent in style and tone. The application must generate thousands of unique descriptions each day. Which type of generative model will meet these requirements?", "options": {"A": "A varflational autoencoder (VAE) model", "B": "A transformer-based model", "C": "A diffusion model", "D": "A generative adversarial network (GAN) model"}, "correct": ["B"], "type": "single"}, {"id": 318, "stem": "An AI practitioner has trained a model on a training dataset. The model performs well on the training data. Hflowever, the model does not perform well on evaluation data. What is the MOST likely cause of this issue?", "options": {"A": "The model is underfit.", "B": "The model requires prompt engineering.", "C": "The model is biased.", "D": "The model is overfit."}, "correct": ["D"], "type": "single"}, {"id": 319, "stem": "A company wants to develop an interpretable ML model to assess the risk of loan applications. Which type of ML model or algorithm will meet these requirements?", "options": {"A": "Deep learning model", "B": "Logistic regression model", "C": "K-means algorithm", "D": "Random cut forest algorithm"}, "correct": ["B"], "type": "single"}, {"id": 320, "stem": "A company stores customer personally identifiable information (PII) data. The company must store the PII data within the company's AWS Region. Which aspect of governance does this describe?", "options": {"A": "Data mining", "B": "Data residency", "C": "Pre-training bias", "D": "Geolocation routing"}, "correct": ["B"], "type": "single"}, {"id": 321, "stem": "A company wants to implement a generative AI solution to improve its marketing operations. The company wants to increase its revenue in the next 6 months. Which approach will meet these requirements?", "options": {"A": "Immedflately start training a custom FM by using the company's existing data.", "B": "Conduct stakeholder interviews to refine use cases and set measurable goals.", "C": "Implement a prebuilt AI assistant solution and measure its impact on customer satisfaction.", "D": "Analyze industry AI implementations and replicate the most successful features."}, "correct": ["B"], "type": "single"}, {"id": 322, "stem": "A healthcare company wants to create a model to improve disease diagnostics by analyzing patient voices. The company has recorded hundreds of patient voices for this project. The company is currently filtering voice recordings according to duration and language. Which phase of the ML lifecycle describes the current project phase?", "options": {"A": "Data collection", "B": "Data preprocessing", "C": "Feature engineering", "D": "Model training"}, "correct": ["B"], "type": "single"}, {"id": 323, "stem": "A company is using Amazon Bedrock to build an AI assistant. The AI assistant helps customers find relevant products by making suggestions. Hflowever, the AI assistant's responses are often generic and irrelevant. The company wants to use prompt engineering to improve the AI assistant's responses. Which solution will meet these requirements?", "options": {"A": "Use few-shot prompting to add domain-specific context and explicit instructions.", "B": "Use chain-of-thought prompting with hidden reasoning steps to ignore explicit domain instructions.", "C": "Modify the AI assistant's conversational style to use more formal language and include technical product specifications.", "D": "Use zero-shot prompting to augment retrieval from a product database."}, "correct": ["A"], "type": "single"}, {"id": 324, "stem": "A company runs a website for users to make travel reservations. The company wants an AI solution to help create consistent branding for hotels on the website. The AI solution needs to generate hotel descriptions for the website in a consistent writing style. Which AWS service will meet these requirements?", "options": {"A": "Amazon Comprehend", "B": "Amazon Personalize", "C": "Amazon Rekognition", "D": "Amazon Bedrock"}, "correct": ["D"], "type": "single"}, {"id": 325, "stem": "A company is using a pre-trained large language model (LLM). The LLM must perform multiple tasks that require specific domain knflowledge. The LLM does not have information about several technical topics in the domain. The company has unlabeled data that the company can use to fine- tune the model. Which fine-tuning method will meet these requirements?", "options": {"A": "Full training", "B": "Supervised fine-tuning", "C": "Continued pre-training", "D": "Retrieval Augmented Generation (RAG)"}, "correct": ["C"], "type": "single"}, {"id": 326, "stem": "A company wants to classify images of different objects based on custom features extracted from a dataset. Which solution will meet this requirement with the LEAST development effort?", "options": {"A": "Use traditional ML algorithms with custom features extracted from the dataset.", "B": "Use a pre-trained deep learning model. Fine-tune the model on the dataset.", "C": "Use a generative adversarial network (GAN) model to classify the images.", "D": "Use a support vector machine (SVM) with manually engineered features for classification."}, "correct": ["B"], "type": "single"}, {"id": 327, "stem": "A company wants to customize Amazon Bedrock foundation models (FMs) to improve an application's performance. The company must prepare a training dataset for text-to-text model fine-tuning. Which dataset format should the company use to train the models?", "options": {"A": "A JSON file with labeled data", "B": "A CSV file with unlabeled data", "C": "A CSV file with tabular data", "D": "A text file with unlabeled data"}, "correct": ["A"], "type": "single"}, {"id": 328, "type": "ordering", "stem": "A company wants to build generative AI applications by using Amazon Bedrock. The company wants to minimize development effort. Select and order the model development techniques from the following list from the LEAST development effort to the MOST development effort. Each model development technique should be selected one time.", "items": ["Prompt engineering", "Retrieval Augmented Generation (RAG)", "Fine-tuning", "Continued pre-training"], "correct": ["Prompt engineering", "Retrieval Augmented Generation (RAG)", "Fine-tuning", "Continued pre-training"]}, {"id": 329, "stem": "An airline company wants to use a generative AI model to convert a flflight booking system from one coding language into another coding language. The company must select a model for this task. Which criteria should the company use to select the correct generative AI model for this task?", "options": {"A": "Syntax, semantic understanding, and code optimization capabilities", "B": "Code generation speed and error handling capabilities", "C": "Ability to generate creative content", "D": "Model size and resource requirements"}, "correct": ["A"], "type": "single"}, {"id": 330, "stem": "An AI practitioner is using Amazon Bedrock Prompt Management to create a reusable prompt. The prompt must be able to interact with external services by calling an external API. Which solution will meet this requirement?", "options": {"A": "Use special tokens.", "B": "Use a tools configuration.", "C": "Use prompt variables.", "D": "Use a stop sequence."}, "correct": ["B"], "type": "single"}, {"id": 331, "stem": "A company wants to use Amazon Q Business for its data. The company needs to ensure the security and privacy of the data. Which combination of steps will meet these requirements? (Choose two.)", "options": {"A": "Enable AWS Key Management Service (AWS KMS) keys for the Amazon Q Business Enterprise index.", "B": "Set up cross-account access to the Amazon Q index.", "C": "Configure Amazon Inspector for authentication.", "D": "Allow public access to the Amazon Q index.", "E": "Configure AWS Identity and Access Management (IAM) for authentication."}, "correct": ["A", "E"], "type": "multi"}, {"id": 332, "stem": "A company uses Amazon Comprehend to analyze customer feedback. A customer has several unique trained models. The company uses Comprehend to assign each model an endpoint. The company wants to automate a report on each endpoint that is not used for more than 15 days. Which service will meet these requirements?", "options": {"A": "AWS Trusted Advisor", "B": "Amazon CloudWatch", "C": "AWS CloudTrail", "D": "AWS Config"}, "correct": ["B"], "type": "single"}, {"id": 333, "stem": "A company plans to use a generative AI model to provide real-time service quotes to users. Which criteria should the company use to select the correct model for this use case?", "options": {"A": "Model size", "B": "Training data quality", "C": "General-purpose use and high-pflowered GPU availability", "D": "Model latency and optimized inference speed"}, "correct": ["D"], "type": "single"}, {"id": 334, "stem": "An AI practitioner must fine-tune an open source large language model (LLM) for text categorization. The dataset is already prepared. Which solution will meet these requirements with the LEAST operational effort?", "options": {"A": "Create a custom model training job in PartyRock on Amazon Bedrock.", "B": "Use Amazon SageMaker JumpStart to create a training job.", "C": "Use a custom script to run an Amazon SageMaker AI model training job.", "D": "Create a Jupyter notebook on an Amazon EC2 instance. Use the notebook to train the model."}, "correct": ["B"], "type": "single"}, {"id": 335, "type": "single", "stem": "Which AWS service can detect text and handwriting from invoices that are stored in PNG format?", "options": {"A": "Amazon Polly", "B": "Amazon Textract", "C": "Amazon Kendra", "D": "Amazon Comprehend"}, "correct": ["B"]}, {"id": 336, "type": "single", "stem": "A data scientist notices that a model has high accuracy on training data, but has low accuracy on testing data. What is causing these results?", "options": {"A": "Not enough training time", "B": "Underfitting", "C": "Too much training data", "D": "Overfitting"}, "correct": ["D"]}, {"id": 337, "type": "single", "stem": "What is a foundation model (FM) in the context of generative AI?", "options": {"A": "A task-specific model that is trained on a narrow domain, such as finance or medicine, to serve as a foundation in that area.", "B": "A large, general-purpose model that is pre-trained on diverse datasets that can be fine-tuned for downstream tasks.", "C": "A theoretical framework to understand how different types of models learn representations.", "D": "A basic architecture that serves as a starting point to design more complex neural networks."}, "correct": ["B"]}, {"id": 338, "type": "single", "stem": "A company wants to increase the consistency and quality of large language model (LLM) responses by providing the model with access to external sources of knowledge. Which technique will meet the requirement with the LEAST development effort?", "options": {"A": "Fine-tuning", "B": "Retrieval Augmented Generation (RAG)", "C": "In-context learning", "D": "Continued pre-training"}, "correct": ["B"]}, {"id": 339, "type": "single", "stem": "A company has a containerized frontend application for its AI application. The company must implement a solution to assess its AWS environment's security posture. The solution must identify potential security vulnerabilities across Amazon EC2 instances and Amazon Elastic Container Registry (Amazon ECR) repositories for the application. The solution should provide recommendations for remediation. Which AWS service will meet these requirements?", "options": {"A": "AWS CloudTrail", "B": "AWS Config", "C": "Amazon Inspector", "D": "AWS Artifact"}, "correct": ["C"]}, {"id": 340, "type": "single", "stem": "A company wants to gain insights from diverse data sources to improve business operations. The data sources include audio from call centers. Which solution will improve transcription accuracy for domain-specific speech?", "options": {"A": "Use a custom bot in Amazon Lex.", "B": "Use a custom language model in Amazon Translate.", "C": "Use batch language identification in Amazon Transcribe.", "D": "Use a custom language model in Amazon Transcribe."}, "correct": ["D"]}, {"id": 341, "type": "single", "stem": "A travel company wants to use a pre-trained generative AI model to generate background images for marketing materials. The company does not have ML expertise. Additionally, the company does not want to customize and host the ML model. Which AWS service will meet these requirements?", "options": {"A": "Amazon Bedrock", "B": "Amazon Comprehend", "C": "Amazon Rekognition", "D": "Amazon Personalize"}, "correct": ["A"]}, {"id": 342, "type": "single", "stem": "A company wants to use generative AI to create product descriptions on its website. What is a limitation of generative AI that the company should be aware of?", "options": {"A": "Generative AI models might produce biased or inappropriate content that requires human review and editing.", "B": "Generative AI cannot handle the large volumes of data that is required for product descriptions.", "C": "Generative AI cannot generate text in the multiple languages that is required for an ecommerce website.", "D": "Generative AI models lack the ability to understand and incorporate product specifications and details."}, "correct": ["A"]}, {"id": 343, "type": "single", "stem": "What is a valid data format for instruction-based fine-tuning?", "options": {"A": "Images that are labeled with categories", "B": "Playlists that are curated with recommended music", "C": "Prompt-response text pairs", "D": "Audio files with transcriptions"}, "correct": ["C"]}, {"id": 344, "type": "single", "stem": "A marketing company wants to generate personalized product descriptions for an ecommerce client's website. The product descriptions must align with the unique style and tone of the existing website. Which prompt engineering technique will meet these requirements with the LEAST operational effort?", "options": {"A": "Few-shot prompting with examples of well-written product descriptions", "B": "Zero-shot prompting without any examples", "C": "Fine-tuning to optimize the descriptions based on customer engagement metrics", "D": "Continued pre-training on a different domain"}, "correct": ["A"]}, {"id": 345, "type": "multi", "stem": "A company wants to identify custom labels to categorize new product images based on historic product images. Which combination of steps will meet this requirement? (Select TWO.)", "options": {"A": "Create a training model project in Amazon Textract.", "B": "Create a training model project in Amazon Rekognition.", "C": "Provide the unlabeled historic images to the model training.", "D": "Label the historic images by category and provide the labeled images to the model training.", "E": "Create a custom model in Amazon Comprehend."}, "correct": ["B", "D"]}, {"id": 346, "type": "single", "stem": "A company uses Amazon SageMaker AI for its ML models. The company wants to implement a solution for model owners to create a record of model information. The model information should include intended uses, risk ratings, training details, and evaluation results. Which SageMaker AI feature will meet these requirements?", "options": {"A": "SageMaker Role Manager", "B": "SageMaker Model Cards", "C": "SageMaker Model Dashboard", "D": "SageMaker Model Monitor"}, "correct": ["B"]}, {"id": 347, "type": "multi", "stem": "A data science team wants to improve a model's performance. The data science team wants to increase the number of variables in the training dataset. Which ML pipeline steps will meet these requirements? (Select TWO.)", "options": {"A": "Hyperparameter tuning", "B": "Model evaluation", "C": "Feature engineering", "D": "Model monitoring", "E": "Data collection"}, "correct": ["C", "E"]}, {"id": 348, "type": "multi", "stem": "A company is building a generative AI application by using a foundation model (FM). The company decides to customize its own FM by using proprietary datasets instead of using a pre-trained, ready to use FM. What are the tradeoffs of customizing the FM? (Select TWO.)", "options": {"A": "Increased risk of hallucination", "B": "Reduced accuracy", "C": "Higher latency", "D": "Higher cost", "E": "Higher implementation complexity"}, "correct": ["D", "E"]}, {"id": 349, "type": "single", "stem": "A company wants to use an open source foundation model (FM) to evaluate if contracts adhere to compliance rules. Which AWS service will meet these requirements?", "options": {"A": "Amazon SageMaker JumpStart", "B": "Amazon Textract", "C": "Amazon Kendra", "D": "Amazon Q Business"}, "correct": ["A"]}, {"id": 350, "type": "single", "stem": "A company wants to record API calls that are made to Amazon Bedrock in log files. For compliance purposes, the company wants these logs to include the API call, the user who made the call, and the time that the call was made. Which AWS service will meet these requirements?", "options": {"A": "Amazon Inspector", "B": "Amazon CloudWatch", "C": "AWS Trusted Advisor", "D": "AWS CloudTrail"}, "correct": ["D"]}, {"id": 351, "type": "single", "stem": "A company is developing a solution on AWS that uses Amazon Bedrock. Which AWS service can the company use to secure access to Amazon Bedrock?", "options": {"A": "Amazon Macie", "B": "Amazon Rekognition", "C": "AWS Identity and Access Management (IAM)", "D": "AWS Config"}, "correct": ["C"]}, {"id": 352, "type": "ordering", "stem": "Select and order the Amazon SageMaker AI inference options from the following list from LOWEST latency to HIGHEST latency. Each SageMaker AI inference option should be selected one time.", "items": ["Real-time inference", "Asynchronous inference", "Batch transform"], "correct": ["Real-time inference", "Asynchronous inference", "Batch transform"]}, {"id": 353, "type": "single", "stem": "A company wants to assess the performance of a foundation model (FM) for text generation. Which technique or metric will meet these requirements?", "options": {"A": "Reinforcement learning", "B": "F1 score", "C": "Recall-Oriented Understudy for Gisting Evaluation (ROUGE)", "D": "Fine-tuning"}, "correct": ["C"]}, {"id": 354, "type": "matching", "stem": "Select the correct AWS service or feature from the following list for each task. Each AWS service or feature should be selected one or more times.", "options": ["Amazon Bedrock Guardrails", "AWS Identity and Access Management (IAM)"], "pairs": [{"description": "Implement identity verification and resource-level access control.", "correct": "AWS Identity and Access Management (IAM)"}, {"description": "Set policies to avoid specific topics in a generative AI application.", "correct": "Amazon Bedrock Guardrails"}, {"description": "Filter harmful content based on defined thresholds for categories.", "correct": "Amazon Bedrock Guardrails"}, {"description": "Define user roles and permissions to access Amazon Bedrock.", "correct": "AWS Identity and Access Management (IAM)"}, {"description": "Monitor and analyze user inputs to ensure compliance with safety policies.", "correct": "Amazon Bedrock Guardrails"}]}]</script>
